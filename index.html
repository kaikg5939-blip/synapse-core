<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SYNAPSE_CORE_SUPREMO</title>
    <style>
        :root { --blue: #0066FF; --bg: #000; }
        * { box-sizing: border-box; font-family: 'JetBrains Mono', monospace; }
        body { margin: 0; background: var(--bg); color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* MODO SUPREMO: LOGINS E SETUP */
        .full-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        /* MENU 3 PONTOS */
        .header { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #222; }
        .dots { cursor: pointer; font-size: 1.5rem; color: var(--blue); }
        
        /* LAYOUT PC VS MOBILE */
        .pc-elements { display: flex; }
        .mode-mobile .desktop-only { display: none !important; }
        
        /* CHAT E CONTROLES */
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; }
        .controls { padding: 15px; border-top: 1px solid #222; display: flex; gap: 10px; }
        input { flex: 1; padding: 15px; background: #111; border: 1px solid #333; color: #fff; }
        button { padding: 15px; background: var(--blue); border: none; color: #fff; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-screen" class="full-screen">
        <input type="password" id="key" placeholder="DIGITE A CHAVE SUPREMA">
        <button onclick="login()">ACESSO TOTAL</button>
    </div>

    <div id="device-screen" class="full-screen" style="display:none;">
        <button onclick="setMode('pc')">MODO COMPUTADOR</button>
        <button onclick="setMode('mobile')">MODO CELULAR (CLEAN)</button>
    </div>

    <div class="header">
        <span>SYNAPSE_v4.5_SUPREMO</span>
        <div class="dots" onclick="alert('SAIR: Recarregue para trocar modo ou Sair.')">⋮</div>
    </div>

    <div id="chat-window"></div>

    <div class="controls">
        <input type="text" id="user-input" placeholder="Comando...">
        <button onclick="enviar()">ENVIAR</button>
        <button onclick="toggleMic()">FALAR</button>
    </div>

    <script>
        function login() {
            if(document.getElementById('key').value === "CORE-SKYPE-2026") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('device-screen').style.display = 'flex';
            }
        }
        function setMode(m) {
            if(m === 'mobile') document.body.classList.add('mode-mobile');
            document.getElementById('device-screen').style.display = 'none';
        }
        // ... (Adicione aqui sua lógica de enviar e voz) ...
    </script>
</body>
</html>
