<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SYNAPSE CORE</title>
    <style>
        :root { --bg: #000; --accent: #0066FF; --text: #fff; }
        body { background: var(--bg); color: var(--text); margin: 0; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; }
        
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 15px; border-radius: 18px; max-width: 85%; font-size: 16px; }
        .ai-msg { align-self: flex-start; background: #1c1c1e; }
        .user-msg { align-self: flex-end; background: var(--accent); }
        
        .controls { padding: 20px; background: #000; display: flex; gap: 10px; }
        input { flex: 1; padding: 15px; border-radius: 25px; border: none; background: #1c1c1e; color: white; }
        .btn { padding: 15px; border-radius: 25px; border: none; background: var(--accent); color: white; font-weight: bold; }
        #mic-btn { background: #444; }
        #mic-btn.active { background: #ff3b30; }
    </style>
</head>
<body>
    <div id="chat-window"></div>
    <div class="controls">
        <input type="text" id="user-input" placeholder="Mensagem...">
        <button id="mic-btn" class="btn" onclick="toggleMic()">🎤</button>
        <button class="btn" onclick="enviar()">OK</button>
    </div>

    <script>
        let rec;
        let isSpeaking = false;

        function toggleMic() {
            if (isSpeaking) return; // Não abre se IA estiver falando
            if (!rec) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                rec = new SpeechRecognition();
                rec.lang = 'pt-BR';
                rec.onresult = (e) => {
                    const texto = e.results[0][0].transcript;
                    document.getElementById('user-input').value = texto;
                    enviar();
                    document.getElementById('mic-btn').classList.remove('active');
                };
                rec.onend = () => document.getElementById('mic-btn').classList.remove('active');
            }
            rec.start();
            document.getElementById('mic-btn').classList.add('active');
        }

        async function enviar() {
            const input = document.getElementById('user-input');
            const msg = input.value.trim();
            if(!msg) return;

            // Mostra msg usuário
            const div = document.createElement('div');
            div.className = 'msg user-msg';
            div.innerText = msg;
            document.getElementById('chat-window').appendChild(div);
            input.value = '';

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mensagens: [{ role: 'user', content: msg }] })
                });
                const data = await res.json();
                
                // Mostra resposta IA
                const divAi = document.createElement('div');
                divAi.className = 'msg ai-msg';
                divAi.innerText = data.resposta;
                document.getElementById('chat-window').appendChild(divAi);
                
                // Fala automática com trava de segurança
                isSpeaking = true;
                const ut = new SpeechSynthesisUtterance(data.resposta);
                ut.onend = () => { isSpeaking = false; };
                window.speechSynthesis.speak(ut);
            } catch(e) { alert("Erro de conexão"); }
        }
    </script>
</body>
</html>
