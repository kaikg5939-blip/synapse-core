<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SYNAPSE CORE v9.5</title>
    <style>
        :root { 
            --blue: #0044FF; 
            --bg: #000000; 
            --panel: rgba(10, 10, 15, 0.75); 
            --border: rgba(0, 68, 255, 0.25); 
            --text: #ffffff; 
            --glow: 0 0 20px rgba(0, 68, 255, 0.35);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            position: relative; 
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 30%, rgba(0, 68, 255, 0.1) 0%, transparent 60%);
            filter: blur(50px);
            z-index: 0;
        }

        /* LOGIN GLASSMORPHISM */
        #login-overlay { position: fixed; inset: 0; background: #000000; backdrop-filter: blur(35px); z-index: 9999; display: flex; align-items: center; justify-content: center; transition: opacity 0.4s; }
        .login-card { background: rgba(15, 15, 20, 0.6); padding: 50px 40px; border-radius: 12px; border: 1px solid var(--border); text-align: center; width: 90%; max-width: 400px; box-shadow: var(--glow); }
        .login-card h3 { letter-spacing: 6px; color: var(--blue); margin-bottom: 40px; font-weight: 400; text-transform: uppercase; }
        .login-card input { width: 100%; padding: 16px; background: rgba(0, 0, 0, 0.5); border: 1px solid #222; border-radius: 12px; color: var(--blue); font-size: 1.2rem; text-align: center; outline: none; letter-spacing: 3px; }
        .login-card button { margin-top: 30px; width: 100%; padding: 16px; background: var(--blue); color: #fff; font-weight: bold; border: none; border-radius: 12px; cursor: pointer; text-transform: uppercase; }

        /* HEADER */
        .header { padding: 20px 40px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(20px); z-index: 100; }
        .nav-brand { font-weight: 600; letter-spacing: 2px; color: var(--blue); font-size: 0.9rem; }
        .nav-actions { display: flex; gap: 15px; }
        .btn-top { padding: 8px 16px; border: 1px solid var(--blue); background: transparent; color: var(--blue); font-size: 0.75rem; font-weight: bold; border-radius: 12px; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn-top:hover { background: var(--blue); color: #fff; box-shadow: var(--glow); }
        .btn-sair { border-color: #ff3355; color: #ff3355; }

        /* GAVETA DE STATUS NATIVA */
        #status-drawer { display: none; position: absolute; top: 85px; left: 40px; background: rgba(10, 10, 15, 0.95); border: 1px solid var(--border); border-radius: 12px; padding: 25px; width: 320px; z-index: 500; font-size: 0.85rem; line-height: 1.6; box-shadow: var(--glow); }
        #status-drawer p { margin-bottom: 8px; color: #aaa; }
        #status-drawer strong { color: var(--blue); }

        /* PALCO CENTRAL */
        .stage { display: flex; flex: 1; overflow: hidden; padding: 25px; gap: 25px; z-index: 1; position: relative; }
        
        /* CONTAINER DO CUBO CENTRADO */
        .visual-console { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; backdrop-filter: blur(20px); position: relative; }
        
        /* O CUBO SUPREMO */
        .cube-scene { width: 100px; height: 100px; perspective: 500px; transform: translateY(-10px); }
        .cube { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; animation: rotateMecha 8s infinite linear; }
        .cube.speaking { animation: rotateMecha 0.5s infinite linear; }
        .cube.speaking .face { border-color: #00ffcc; box-shadow: inset 0 0 25px rgba(0, 255, 204, 0.4); }
        
        @keyframes rotateMecha { 100% { transform: rotateX(360deg) rotateY(360deg); } }
        
        .face { position: absolute; width: 100px; height: 100px; border: 2px solid var(--blue); background: rgba(0, 0, 0, 0.6); box-shadow: inset 0 0 15px rgba(0, 68, 255, 0.15); transition: all 0.3s; }
        .front  { transform: rotateY(  0deg) translateZ(50px); }
        .back   { transform: rotateY(180deg) translateZ(50px); }
        .right  { transform: rotateY( 90deg) translateZ(50px); }
        .left   { transform: rotateY(-90deg) translateZ(50px); }
        .top    { transform: rotateX( 90deg) translateZ(50px); }
        .bottom { transform: rotateX(-90deg) translateZ(50px); }

        /* SELETOR DE CORES PREMIUM */
        .theme-switcher { position: absolute; left: 20px; top: 20px; display: flex; gap: 12px; background: rgba(0,0,0,0.4); padding: 10px; border-radius: 20px; }
        .color-selector { width: 18px; height: 18px; border-radius: 50%; cursor: pointer; transition: 0.2s; }
        .color-selector:hover { transform: scale(1.2); }

        /* PAINEL DE CHAT */
        #terminal-log { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; backdrop-filter: blur(20px); }
        .log-entry { padding: 18px; background: rgba(10, 10, 15, 0.4); border-radius: 12px; border: 1px solid rgba(255,255,255,0.02); line-height: 1.6; font-size: 0.95rem; max-width: 85%; position: relative; }
        .user-entry { align-self: flex-end; border-color: var(--blue); color: var(--blue); font-weight: 500; }
        .ai-entry { align-self: flex-start; }

        /* BOTÕES DE COPIAR E OUVIR (APENAS TEXTO) */
        .action-bar { display: flex; gap: 10px; margin-top: 12px; }
        .btn-action-msg { padding: 5px 12px; background: transparent; border: 1px solid var(--blue); color: var(--blue); font-size: 0.7rem; font-weight: bold; border-radius: 8px; cursor: pointer; text-transform: uppercase; }
        .btn-action-msg:hover { background: var(--blue); color: #fff; }

        /* HISTÓRICO LATERAL DIREITO */
        #history-sidebar { display: none; width: 280px; background: rgba(5, 5, 10, 0.9); border-left: 1px solid var(--border); padding: 25px; flex-direction: column; gap: 20px; z-index: 200; backdrop-filter: blur(20px); }
        .btn-new-chat { width: 100%; padding: 14px; background: transparent; border: 1px solid var(--blue); color: var(--blue); font-weight: bold; border-radius: 12px; cursor: pointer; text-transform: uppercase; }
        .history-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .history-item { padding: 12px; background: rgba(20, 20, 25, 0.5); border-radius: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; border: 1px solid rgba(255,255,255,0.02); cursor: pointer; }
        .btn-del-chat { background: transparent; border: none; color: #ff3355; font-weight: bold; cursor: pointer; padding: 0 5px; }

        /* DIGITAL COMMAND BAR */
        .command-bar { padding: 25px 40px; background: var(--panel); border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 15px; backdrop-filter: blur(20px); z-index: 100; }
        .input-row { display: flex; gap: 20px; align-items: center; }
        .field-container { flex: 1; position: relative; background: #000; border: 1px solid #222; border-radius: 12px; }
        .field-container::before { content: 'DIRETRIZ:'; position: absolute; left: 20px; top: 18px; font-size: 0.85rem; color: #555; font-weight: bold; }
        .field-container:focus-within { border-color: var(--blue); box-shadow: var(--glow); }
        .main-input { width: 100%; padding: 18px 20px 18px 105px; background: transparent; border: none; color: #fff; outline: none; font-size: 1rem; }
        
        .btn-core { height: 56px; padding: 0 40px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
        .btn-execute { background: var(--blue); color: #fff; box-shadow: var(--glow); }
        .btn-voice { background: rgba(20, 22, 25, 0.9); color: #fff; border: 1px solid #333; }
        .btn-voice.active { background: #ff3355; border-color: #ff3355; box-shadow: 0 0 15px #ff3355; }

        /* RESPONSIVIDADE TELEFONE (CUBO NO CENTRO-BAIXO) */
        @media (max-width: 900px) {
            .stage { flex-direction: column-reverse; padding: 15px; gap: 15px; }
            .visual-console { min-height: 160px; height: 160px; flex: none; background: transparent; border: none; backdrop-filter: none; }
            .cube-scene { width: 50px; height: 50px; transform: translateY(10px); }
            .face { width: 50px; height: 50px; }
            .front  { transform: rotateY(  0deg) translateZ(25px); }
            .back   { transform: rotateY(180deg) translateZ(25px); }
            .right  { transform: rotateY( 90deg) translateZ(25px); }
            .left   { transform: rotateY(-90deg) translateZ(25px); }
            .top    { transform: rotateX( 90deg) translateZ(25px); }
            .bottom { transform: rotateX(-90deg) translateZ(25px); }
            #terminal-log { width: 100%; flex: 1; }
            .theme-switcher { left: 20px; top: auto; bottom: 10px; }
            .command-bar { padding: 20px 15px; }
            .input-row { flex-wrap: wrap; gap: 10px; }
            .field-container { min-width: 100%; }
            .btn-core { flex: 1; height: 52px; }
            #history-sidebar { position: fixed; right: 0; top: 85px; bottom: 110px; box-shadow: -10px 0 30px rgba(0,0,0,0.8); }
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h3>SYNAPSE CORE</h3>
            <input type="password" id="access-key" placeholder="CHAVE" onkeydown="if(event.key==='Enter') verificarSinal()">
            <button onclick="verificarSinal()">CONECTAR</button>
            <p id="error-alert" style="color:#ff3355; font-size:0.75rem; margin-top:15px; display:none;">SINAL REJEITADO</p>
        </div>
    </div>

    <div class="header">
        <div class="nav-brand">SYNAPSE_CORE_v9.5</div>
        <div class="nav-actions">
            <button class="btn-top" onclick="toggleStatus()">STATUS</button>
            <button class="btn-top" onclick="toggleHistory()">HISTORICO</button>
            <button class="btn-top btn-sair" onclick="fecharSessao()">OFFLINE</button>
        </div>
    </div>

    <div id="status-drawer">
        <p>DESENVOLVEDOR: <strong>SKYPE</strong></p>
        <p>ESTABELECIDO: <strong>JUNHO DE 2026</strong></p>
        <p>GERENCIAMENTO: <strong>EXCLUSIVO</strong></p>
        <p>PERMISSAO: <strong>1 USUARIO AUTORIZADO</strong></p>
        <p>STATUS DO CORE: <strong>ONLINE</strong></p>
    </div>

    <div class="stage">
        <div class="visual-console">
            <div class="theme-switcher">
                <div class="color-selector" style="background:#0044FF;" onclick="mudarTema('#0044FF')"></div>
                <div class="color-selector" style="background:#8800FF;" onclick="mudarTema('#8800FF')"></div>
                <div class="color-selector" style="background:#FF0044;" onclick="mudarTema('#FF0044')"></div>
                <div class="color-selector" style="background:#00DFFF;" onclick="mudarTema('#00DFFF')"></div>
            </div>
            <div class="cube-scene">
                <div class="cube" id="sys-cube">
                    <div class="face front"></div><div class="face back"></div>
                    <div class="face right"></div><div class="face left"></div>
                    <div class="face top"></div><div class="face bottom"></div>
                </div>
            </div>
        </div>

        <div id="terminal-log"></div>

        <div id="history-sidebar">
            <button class="btn-new-chat" onclick="novoChat()">NOVO SINAL</button>
            <div class="history-list" id="chats-list"></div>
        </div>
    </div>

    <div class="command-bar">
        <div class="input-row">
            <div class="field-container">
                <input type="text" id="console-in" class="main-input" placeholder="ENTRADA DE PROMPT..." onkeydown="if(event.key==='Enter') processarFluxo('texto')">
            </div>
            <button class="btn-core btn-execute" onclick="processarFluxo('texto')">ENVIAR</button>
            <button class="btn-core btn-voice" id="btn-mic" onclick="ouvirAudio()">FALAR</button>
        </div>
    </div>

    <script>
        let chats = JSON.parse(localStorage.getItem('syn_chats')) || {};
        let chatAtivo = localStorage.getItem('syn_chat_ativo') || null;
        let gatilhoEntrada = 'texto';

        window.onload = () => {
            if (sessionStorage.getItem('syn_core_v95') === 'auth') {
                document.getElementById('login-overlay').style.display = 'none';
                renderizarListaChats();
                if (chatAtivo && chats[chatAtivo]) carregarChat(chatAtivo);
            }
        };

        function verificarSinal() {
            if (document.getElementById('access-key').value.trim().toUpperCase() === "CORE-SKYPE-2026") {
                sessionStorage.setItem('syn_core_v95', 'auth');
                document.getElementById('login-overlay').style.display = 'none';
                if (Object.keys(chats).length === 0) novoChat();
                renderizarListaChats();
            } else {
                document.getElementById('error-alert').style.display = 'block';
            }
        }

        function fecharSessao() { sessionStorage.removeItem('syn_core_v95'); window.location.reload(); }
        function mudarTema(hex) { document.documentElement.style.setProperty('--blue', hex); }
        function toggleStatus() { const d = document.getElementById('status-drawer'); d.style.display = d.style.display === 'block' ? 'none' : 'block'; }
        function toggleHistory() { const s = document.getElementById('history-sidebar'); s.style.display = s.style.display === 'flex' ? 'none' : 'flex'; }

        // MÓDULO DE HISTÓRICO AVANÇADO
        function novoChat() {
            const id = 'chat_' + Date.now();
            chats[id] = { titulo: "SINAL VAZIO", memoria: [] };
            chatAtivo = id;
            salvarDados();
            carregarChat(id);
        }

        function carregarChat(id) {
            chatAtivo = id;
            localStorage.setItem('syn_chat_ativo', id);
            document.getElementById('terminal-log').innerHTML = '';
            chats[id].memoria.forEach(msg => adicionarBalaoTela(msg.content, msg.role === 'assistant', false));
            renderizarListaChats();
        }

        function excluirChat(id, e) {
            e.stopPropagation();
            delete chats[id];
            if (chatAtivo === id) {
                const asKeys = Object.keys(chats);
                chatAtivo = asKeys.length > 0 ? asKeys[0] : null;
            }
            salvarDados();
            if (chatAtivo) carregarChat(chatAtivo); else novoChat();
        }

        function salvarDados() {
            localStorage.setItem('syn_chats', JSON.stringify(chats));
            localStorage.setItem('syn_chat_ativo', chatAtivo);
        }

        function renderizarListaChats() {
            const container = document.getElementById('chats-list');
            container.innerHTML = '';
            Object.keys(chats).forEach(id => {
                const item = document.createElement('div');
                item.className = `history-item ${id === chatAtivo ? 'user-entry' : ''}`;
                item.onclick = () => carregarChat(id);
                item.innerHTML = `<span>${chats[id].titulo}</span><button class="btn-del-chat" onclick="excluirChat('${id}', event)">X</button>`;
                container.appendChild(item);
            });
        }

        // MÓDULO DE MENSAGEM AVANÇADO
        function adicionarBalaoTela(texto, isAi, isNovo = true) {
            const painel = document.getElementById('terminal-log');
            const div = document.createElement('div');
            div.className = `log-entry ${isAi ? 'ai-entry' : 'user-entry'}`;
            div.innerText = texto;
            
            if (isAi && gatilhoEntrada === 'texto') {
                const actions = document.createElement('div');
                actions.className = 'action-bar';
                
                const btnCopiar = document.createElement('button');
                btnCopiar.className = 'btn-action-msg';
                btnCopiar.innerText = 'COPIAR';
                btnCopiar.onclick = () => navigator.clipboard.writeText(texto);

                const btnOuvir = document.createElement('button');
                btnOuvir.className = 'btn-action-msg';
                btnOuvir.innerText = 'OUVIR';
                btnOuvir.onclick = () => vocalizar(texto);

                actions.appendChild(btnCopiar);
                actions.appendChild(btnOuvir);
                div.appendChild(actions);
            }

            painel.appendChild(div);
            painel.scrollTop = painel.scrollHeight;
        }

        async function processarFluxo(modo) {
            const input = document.getElementById('console-in');
            const prompt = input.value.trim();
            if (!prompt || !chatAtivo) return;

            gatilhoEntrada = modo;
            input.value = '';

            if (chats[chatAtivo].titulo === "SINAL VAZIO") {
                chats[chatAtivo].titulo = prompt.substring(0, 15).toUpperCase();
            }

            adicionarBalaoTela(prompt, false);
            chats[chatAtivo].memoria.push({ role: "user", content: prompt });
            salvarDados();

            try {
                const conexao = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mensagens: chats[chatAtivo].memoria })
                });
                const corpo = await conexao.json();
                const resposta = corpo.resposta;

                adicionarBalaoTela(resposta, true);
                chats[chatAtivo].memoria.push({ role: "assistant", content: resposta });
                salvarDados();

                if (gatilhoEntrada === 'voz') vocalizar(resposta);
            } catch (err) {
                adicionarBalaoTela("SINAL INTERROMPIDO. VERIFIQUE SEU REPOSITORIO.", true);
            }
        }

        // MOTORES DE ÁUDIO E ANIMAÇÃO DO CUBO
        function ouvirAudio() {
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(''));
            const SpeechEngine = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechEngine) return;

            const captura = new SpeechEngine();
            captura.lang = 'pt-BR';
            captura.continuous = false;

            captura.onstart = () => {
                document.getElementById('btn-mic').innerText = "OUVINDO...";
                document.getElementById('btn-mic').classList.add('active');
            };
            captura.onresult = (e) => {
                document.getElementById('console-in').value = e.results[0][0].transcript;
                processarFluxo('voz');
                captura.stop();
            };
            captura.onend = () => {
                document.getElementById('btn-mic').innerText = "FALAR";
                document.getElementById('btn-mic').classList.remove('active');
            };
            captura.start();
        }

        function vocalizar(texto) {
            window.speechSynthesis.cancel();
            const tts = new SpeechSynthesisUtterance(texto);
            tts.lang = 'pt-BR';
            tts.onstart = () => document.getElementById('sys-cube').classList.add('speaking');
            tts.onend = () => document.getElementById('sys-cube').classList.remove('speaking');
            window.speechSynthesis.speak(tts);
        }
    </script>
</body>
</html>
