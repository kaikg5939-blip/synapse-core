<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SYNAPSE CORE</title>
    <style>
        :root { 
            --blue: #ffffff; 
            --bg: #000000; 
            --panel: rgba(10, 10, 12, 0.96); 
            --glow: 0 0 35px rgba(255, 255, 255, 0.4);
            --font-display: -apple-system, SF Pro Text, SF Pro Display, BlinkMacSystemFont, Helvetica, Arial, sans-serif;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-display); letter-spacing: -0.01em; -webkit-tap-highlight-color: transparent; }
        
        ::-webkit-scrollbar { width: 0px; height: 0px; display: none; }
        
        body { 
            background: var(--bg); 
            color: #ffffff; 
            height: 100vh;
            height: 100dvh;
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            position: relative; 
            font-weight: 400;
            -webkit-text-size-adjust: 100%;
            scrollbar-width: none;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 25%, rgba(255, 255, 255, 0.03) 0%, transparent 65%);
            filter: blur(50px);
            z-index: 0;
            pointer-events: none;
        }

        /* LOGIN OVERLAY */
        #login-overlay { position: fixed; inset: 0; background: #000000; backdrop-filter: blur(45px); -webkit-backdrop-filter: blur(45px); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: rgba(15, 15, 20, 0.85); padding: 45px 35px; border-radius: 20px; text-align: center; width: 88%; max-width: 380px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.05); }
        .login-card h3 { font-size: 1.4rem; font-weight: 800; letter-spacing: 3px; margin-bottom: 30px; text-transform: uppercase; color: #fff; }
        .login-card input { width: 100%; padding: 16px; background: rgba(0, 0, 0, 0.7); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; color: #ffffff; font-size: 1.1rem; text-align: center; outline: none; letter-spacing: 5px; font-weight: 700; }
        .login-card button { margin-top: 25px; width: 100%; padding: 16px; background: #ffffff; border: none; color: #000000; font-weight: 700; border-radius: 14px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: opacity 0.2s; }
        .login-card button:hover { opacity: 0.9; }

        /* HEADER INTERFACE REESTRUTURADO PARA IPHONE */
        .header { padding: 16px 20px; background: var(--panel); display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .brand-group { display: flex; align-items: center; gap: 12px; }
        .btn-trigger-menu { background: transparent; border: none; color: #fff; font-size: 1.4rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .nav-brand { font-size: 1.25rem; font-weight: 900; letter-spacing: -0.5px; color: #ffffff; text-transform: uppercase; }
        .nav-actions { display: flex; gap: 6px; align-items: center; }
        
        .btn-top { padding: 10px 12px; border: none; background: rgba(255, 255, 255, 0.06); border-radius: 10px; color: #fff; font-size: 0.72rem; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; }
        .btn-top:active { background: rgba(255, 255, 255, 0.15); }
        .btn-new-top { background: #ffffff; color: #000000; }
        .btn-sair { color: #ff4466; background: rgba(255, 68, 102, 0.08); }

        /* GAVETAS FLUTUANTES */
        .drawer-box { display: none; position: absolute; top: 75px; background: rgba(10, 10, 12, 0.99); border-radius: 18px; padding: 22px; z-index: 500; box-shadow: var(--glow); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.08); width: calc(100% - 40px); left: 20px; right: 20px; }
        #status-drawer p { margin-bottom: 8px; color: #666; text-transform: uppercase; font-weight: 700; font-size: 0.72rem; letter-spacing: 0.5px; }
        #status-drawer strong { color: #fff; font-weight: 600; font-size: 0.85rem; }
        .status-editable { border-bottom: 1px dashed rgba(255,255,255,0.2); cursor: pointer; }

        /* AVISOS */
        #notices-drawer { max-height: 400px; flex-direction: column; gap: 14px; }
        .notice-input-group { display: flex; gap: 10px; width: 100%; }
        .notice-input-group input { flex: 1; padding: 12px 16px; background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #fff; font-size: 0.85rem; outline: none; }
        .btn-add-notice { padding: 12px 16px; background: #ffffff; border: none; border-radius: 10px; color: #000; font-size: 0.8rem; font-weight: 700; cursor: pointer; text-transform: uppercase; }
        .notices-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .notice-item { background: rgba(255, 255, 255, 0.03); padding: 14px; border-radius: 12px; display: flex; flex-direction: column; gap: 8px; border-left: 3px solid #fff; }
        .notice-text { font-size: 0.85rem; color: #e1e1e1; line-height: 1.4; word-break: break-word; }
        .notice-actions { display: flex; gap: 12px; justify-content: flex-end; }
        .btn-notice-op { background: transparent; border: none; font-size: 0.65rem; font-weight: 700; cursor: pointer; text-transform: uppercase; }
        .btn-notice-edit { color: #888; }
        .btn-notice-del { color: #ff4466; }

        /* PALCO CENTRAL */
        .stage { display: flex; flex: 1; overflow: hidden; padding: 15px; gap: 15px; z-index: 1; position: relative; flex-direction: column-reverse; }
        
        /* GAVETA DE HISTÓRICO CORRIGIDA PARA CORRER E FECHAR AUTOMÁTICO */
        #history-sidebar { display: none; position: fixed; left: -290px; top: 0; bottom: 0; width: 280px; background: rgba(8, 8, 10, 0.99); padding: 85px 20px 30px 20px; box-shadow: 25px 0 50px rgba(0,0,0,0.95); z-index: 400; flex-direction: column; gap: 20px; backdrop-filter: blur(35px); -webkit-backdrop-filter: blur(35px); border-right: 1px solid rgba(255,255,255,0.08); transition: left 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        #history-sidebar.menu-aberto { display: flex !important; left: 0 !important; }
        
        .btn-sidebar-new { width: 100%; padding: 14px; background: #ffffff; border: none; color: #000; font-weight: 700; border-radius: 12px; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; }
        .history-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; scrollbar-width: none; }
        .history-item { padding: 14px; background: rgba(255, 255, 255, 0.03); border-radius: 12px; display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; font-weight: 600; cursor: pointer; color: #ffffff; border: 1px solid rgba(255,255,255,0.02); }
        .history-item.active-chat { color: #000000 !important; background: #ffffff; font-weight: 700; }
        .btn-del-chat { background: transparent; border: none; color: #555; font-size: 0.65rem; font-weight: 700; cursor: pointer; text-transform: uppercase; }

        /* PAINEL DO CUBO CYBERPUNK - VOLTOU A ALTA QUALIDADE GOLW MATRIZ */
        .visual-console { width: 100%; height: 85px; display: flex; align-items: center; justify-content: center; background: transparent; position: relative; flex-shrink: 0; }
        .cube-scene { width: 55px; height: 55px; perspective: 400px; position: relative; display: flex; align-items: center; justify-content: center; }
        .cube-scene::after { content: ''; position: absolute; width: 85px; height: 85px; border: 1px dashed rgba(255, 255, 255, 0.15); border-radius: 50%; animation: rotateRing 20s infinite linear; pointer-events: none; }
        @keyframes rotateRing { 100% { transform: rotate(360deg); } }

        .cube { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; animation: rotateMecha 18s infinite linear; }
        .cube.speaking .face { border-color: var(--blue); box-shadow: 0 0 30px var(--blue), inset 0 0 18px rgba(255, 255, 255, 0.5); opacity: 1; filter: brightness(1.2); }
        @keyframes rotateMecha { 100% { transform: rotateX(360deg) rotateY(360deg); } }
        
        /* LINHAS BRANCAS EM FUNDO ESCURO PREMIUM ESCOVADO */
        .face { position: absolute; width: 55px; height: 55px; border: 2px solid var(--blue); background: rgba(12, 12, 14, 0.98); box-shadow: 0 0 15px rgba(255, 255, 255, 0.1), inset 0 0 10px rgba(255, 255, 255, 0.05); transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); opacity: 0.9; }
        .front  { transform: rotateY(  0deg) translateZ(27.5px); }
        .back   { transform: rotateY(180deg) translateZ(27.5px); }
        .right  { transform: rotateY( 90deg) translateZ(27.5px); }
        .left   { transform: rotateY(-90deg) translateZ(27.5px); }
        .top    { transform: rotateX( 90deg) translateZ(27.5px); }
        .bottom { transform: rotateX(-90deg) translateZ(27.5px); }

        .theme-switcher { position: absolute; right: 10px; display: flex; gap: 8px; background: rgba(255,255,255,0.05); padding: 8px 10px; border-radius: 20px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
        .color-selector { width: 10px; height: 10px; border-radius: 50%; cursor: pointer; }

        /* TERMINAL DE CONVERSA - BRANCO TOTAL */
        #terminal-log { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 5px 10px; display: flex; flex-direction: column; gap: 24px; width: 100%; }
        .log-entry { line-height: 1.6; font-size: 0.98rem; max-width: 100%; color: #ffffff !important; font-weight: 400; word-wrap: break-word; }
        .user-entry { align-self: flex-end; text-align: right; width: 100%; color: #ffffff !important; font-weight: 500; }
        .ai-entry { align-self: flex-start; width: 100%; color: #ffffff !important; }
        .img-container { max-width: 100%; max-height: 300px; border-radius: 14px; margin-top: 10px; display: block; }

        .action-bar { display: flex; gap: 14px; margin-top: 8px; }
        .btn-action-msg { background: transparent; border: none; color: #555; font-size: 0.7rem; font-weight: 700; cursor: pointer; text-transform: uppercase; }
        .btn-action-msg.playing-audio { color: #ff4466 !important; }

        /* COMMAND BAR ADAPTADO */
        .command-bar { padding: 12px 15px; background: var(--panel); display: flex; flex-direction: column; gap: 10px; border-top: 1px solid rgba(255,255,255,0.04); z-index: 100; }
        .input-row { display: flex; gap: 10px; width: 100%; align-items: center; }
        .field-container { flex: 1; position: relative; background: rgba(255, 255, 255, 0.04); border-radius: 14px; border: 1px solid rgba(255,255,255,0.02); }
        .field-container::before { content: 'IN:'; position: absolute; left: 16px; top: 15px; font-size: 0.75rem; color: #666; font-weight: 800; }
        .main-input { width: 100%; padding: 14px 14px 14px 45px; background: transparent; border: none; color: #fff; outline: none; font-size: 0.95rem; }
        
        .btn-core { height: 48px; padding: 0 16px; border: none; background: rgba(255, 255, 255, 0.06); color: #fff; border-radius: 14px; font-weight: 700; cursor: pointer; font-size: 0.75rem; text-transform: uppercase; }
        .btn-core:active { background: rgba(255,255,255,0.15); }
        .btn-voice.mic-listening { background: rgba(0, 255, 102, 0.1) !important; color: #00ff66 !important; }
        .btn-voice.tts-speaking { background: rgba(255, 68, 102, 0.1) !important; color: #ff4466 !important; }

        /* LAYOUT DESKTOP */
        @media (min-width: 851px) {
            .stage { flex-direction: row; padding: 30px; gap: 30px; }
            .btn-trigger-menu { display: none; }
            #history-sidebar { display: flex !important; position: relative; top: auto; bottom: auto; left: auto !important; width: 240px; padding: 0; background: transparent; box-shadow: none; border-right: none; }
            .visual-console { width: 200px; height: 100%; flex-direction: column; }
            .cube-scene { width: 80px; height: 80px; }
            .cube-scene::after { width: 120px; height: 120px; }
            .face { width: 80px; height: 80px; }
            .front  { transform: rotateY(  0deg) translateZ(40px); }
            .back   { transform: rotateY(180deg) translateZ(40px); }
            .right  { transform: rotateY( 90deg) translateZ(40px); }
            .left   { transform: rotateY(-90deg) translateZ(40px); }
            .top    { transform: rotateX( 90deg) translateZ(40px); }
            .bottom { transform: rotateX(-90deg) translateZ(40px); }
            .theme-switcher { bottom: 10px; right: auto; }
            .drawer-box { width: 340px; left: auto; }
            #status-drawer { left: 30px; }
            #notices-drawer { right: 30px; }
            .command-bar { padding: 25px 45px; }
            .field-container::before { left: 22px; top: 18px; }
            .main-input { padding: 16px 16px 16px 80px; }
            .btn-core { height: 52px; padding: 0 28px; }
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h3>SYNAPSE CORE</h3>
            <input type="password" id="access-key" placeholder="CHAVE" onkeydown="if(event.key==='Enter') verificarSinal()">
            <button onclick="verificarSinal()">AUTENTICAR</button>
            <p id="error-alert" style="color:#ff4466; font-size:0.75rem; margin-top:15px; display:none; letter-spacing:1px; font-weight:700;">CHAVE INVÁLIDA</p>
        </div>
    </div>

    <div class="header">
        <div class="brand-group">
            <button class="btn-trigger-menu" onclick="toggleHistory()">☰</button>
            <div class="nav-brand">SYNAPSE CORE</div>
        </div>
        <div class="nav-actions">
            <button class="btn-top btn-new-top" onclick="novoChat()">+ NOVO</button>
            <button class="btn-top" onclick="toggleDrawer('notices-drawer')">AVISOS</button>
            <button class="btn-top" onclick="toggleDrawer('status-drawer')">STATUS</button>
            <button class="btn-top btn-sair" onclick="fecharSessao()">SAIR</button>
        </div>
    </div>

    <div id="status-drawer" class="drawer-box">
        <p>DESENVOLVEDOR: <strong id="st-dev" class="status-editable" onclick="editarStatus('st-dev', 'DESENVOLVEDOR')">SKYPE</strong></p>
        <p>ESTABELECIDO: <strong id="st-date" class="status-editable" onclick="editarStatus('st-date', 'ESTABELECIDO')">JUNHO DE 2026</strong></p>
        <p>GERENCIAMENTO: <strong id="st-mng" class="status-editable" onclick="editarStatus('st-mng', 'GERENCIAMENTO')">EXCLUSIVO</strong></p>
        <p>ACESSO ATUAL: <strong id="st-user" style="color:rgba(255,255,255,0.7);">AGUARDANDO...</strong></p>
        <p>STATUS: <strong style="color:#00ff66;">ONLINE</strong></p>
    </div>

    <div id="notices-drawer" class="drawer-box">
        <div class="notice-input-group" id="notice-form-block">
            <input type="text" id="notice-in" placeholder="NOVO AVISO UNIFICADO...">
            <button class="btn-add-notice" id="btn-save-notice" onclick="salvarAviso()">SALVAR</button>
        </div>
        <div class="notices-list" id="notices-container"></div>
    </div>

    <div class="stage">
        <div id="history-sidebar">
            <button class="btn-sidebar-new" onclick="novoChat()">NOVO CHAT</button>
            <div class="history-list" id="chats-list"></div>
        </div>

        <div class="visual-console">
            <div class="cube-scene">
                <div class="cube" id="sys-cube">
                    <div class="face front"></div><div class="face back"></div>
                    <div class="face right"></div><div class="face left"></div>
                    <div class="face top"></div><div class="face bottom"></div>
                </div>
            </div>
            <div class="theme-switcher">
                <div class="color-selector" style="background:#ffffff;" onclick="mudarTema('#ffffff')"></div>
                <div class="color-selector" style="background:#0044FF;" onclick="mudarTema('#0044FF')"></div>
                <div class="color-selector" style="background:#8800FF;" onclick="mudarTema('#8800FF')"></div>
                <div class="color-selector" style="background:#FF0044;" onclick="mudarTema('#FF0044')"></div>
            </div>
        </div>

        <div id="terminal-log"></div>
    </div>

    <div class="command-bar">
        <div class="input-row">
            <div class="field-container">
                <input type="text" id="console-in" class="main-input" placeholder="DIGITE A OPERAÇÃO..." onkeydown="if(event.key==='Enter') processarFluxo('texto')">
            </div>
            <button class="btn-core" onclick="processarFluxo('texto')">ENVIAR</button>
            <button class="btn-core btn-voice" id="btn-mic" onclick="alternarMicrofoneOuParar()">FALAR</button>
        </div>
    </div>

    <script>
        let todosOsChatsPorUsuario = JSON.parse(localStorage.getItem('syn_v10_multichats')) || {};
        let avisosGlobal = JSON.parse(localStorage.getItem('syn_v10_avisos_global')) || [];
        let metadataStatus = JSON.parse(localStorage.getItem('syn_v10_meta_status')) || {};
        
        let chats = {}; 
        let chatAtivo = null;
        let idAvisoEditando = null;
        let gatilhoEntrada = 'texto';
        let statusVozAtiva = false; 
        let ttsAtual = null;
        let botaoOuvirAtivoGlobal = null;
        let loginNivel = "guest";
        let chaveLogadaGlobal = "";
        let EventSourceInjetado = null;

        window.onload = () => {
            if (sessionStorage.getItem('syn_auth_v10') === 'valid') {
                loginNivel = sessionStorage.getItem('syn_auth_nivel') || "guest";
                chaveLogadaGlobal = sessionStorage.getItem('syn_auth_chave') || "";
                chats = todosOsChatsPorUsuario[chaveLogadaGlobal] || {};
                chatAtivo = localStorage.getItem(`syn_v10_ativo_${chaveLogadaGlobal}`) || null;
                aplicarNivelRestricoesUI();
                document.getElementById('login-overlay').style.display = 'none';
                renderizarListaChats();
                renderizarAvisos();
                carregarMetadadosStatus();
                conectarCanalAvisosAnonimo();
                if (chatAtivo && chats[chatAtivo]) carregarChat(chatAtivo);
            }
        };

        function verificarSinal() {
            const chave = document.getElementById('access-key').value.trim().toUpperCase();
            let valido = false;
            
            if (chave === "CORE-SKYPE-2026") { loginNivel = "MASTER (SKYPE)"; valido = true; } 
            else if (chave.startsWith("BETA-CORE-V")) {
                let num = parseInt(chave.replace("BETA-CORE-V", ""));
                if (num >= 1 && num <= 20) { loginNivel = `OPERADOR BETA ${num}`; valido = true; }
            } 
            else if (chave === "SKYPE-BETA-TEST") { loginNivel = "TESTADOR EXTERNO"; valido = true; }

            if (valido) {
                chaveLogadaGlobal = chave;
                sessionStorage.setItem('syn_auth_v10', 'valid');
                sessionStorage.setItem('syn_auth_nivel', loginNivel);
                sessionStorage.setItem('syn_auth_chave', chaveLogadaGlobal);
                if (!todosOsChatsPorUsuario[chaveLogadaGlobal]) todosOsChatsPorUsuario[chaveLogadaGlobal] = {};
                chats = todosOsChatsPorUsuario[chaveLogadaGlobal];
                chatAtivo = localStorage.getItem(`syn_v10_ativo_${chaveLogadaGlobal}`) || null;
                aplicarNivelRestricoesUI();
                document.getElementById('login-overlay').style.display = 'none';
                if (Object.keys(chats).length === 0) novoChat();
                renderizarListaChats();
                renderizarAvisos();
                carregarMetadadosStatus();
                conectarCanalAvisosAnonimo();
                rastrearAcessoIp(loginNivel);
            } else {
                document.getElementById('error-alert').style.display = 'block';
            }
        }

        async function rastrearAcessoIp(nivelUsuario) {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const dadosIp = await res.json();
                const ipCapturado = dadosIp.ip || "IP DESCONHECIDO";
                const horarioLocal = new Date().toLocaleString('pt-BR');
                fetch("https://ntfy.sh/synapse_core_seguranca_skype", {
                    method: "POST",
                    headers: { "Title": `ACESSO: ${nivelUsuario}`, "Tags": "shield,key" },
                    body: `Usuário: ${nivelUsuario}\nIP: ${ipCapturado}\nData: ${horarioLocal}`
                });
            } catch (err) {}
        }

        function conectarCanalAvisosAnonimo() {
            if (EventSourceInjetado) EventSourceInjetado.close();
            EventSourceInjetado = new EventSource("https://ntfy.sh/synapse_core_avisos_skype/sse");
            EventSourceInjetado.onmessage = (e) => {
                try {
                    const dados = JSON.parse(e.data);
                    if (dados.event === "message" && dados.message) {
                        const payload = JSON.parse(dados.message);
                        if (payload.action === "sync") {
                            avisosGlobal = payload.data;
                            localStorage.setItem('syn_v10_avisos_global', JSON.stringify(avisosGlobal));
                            renderizarAvisos();
                        }
                    }
                } catch(err) {}
            };
        }

        function dispararSincronizacaoAvisosNuvem() {
            fetch("https://ntfy.sh/synapse_core_avisos_skype", {
                method: "POST",
                body: JSON.stringify({ action: "sync", data: avisosGlobal })
            });
        }

        function aplicarNivelRestricoesUI() {
            document.getElementById('st-user').innerText = loginNivel;
            const formAvisos = document.getElementById('notice-form-block');
            if (loginNivel === "MASTER (SKYPE)") { if(formAvisos) formAvisos.style.display = "flex"; } 
            else { if(formAvisos) formAvisos.style.display = "none"; }
        }

        function carregarMetadadosStatus() {
            if(metadataStatus.dev) document.getElementById('st-dev').innerText = metadataStatus.dev;
            if(metadataStatus.date) document.getElementById('st-date').innerText = metadataStatus.date;
            if(metadataStatus.mng) document.getElementById('st-mng').innerText = metadataStatus.mng;
        }

        function editarStatus(idAlvo, chaveLabel) {
            if (loginNivel !== "MASTER (SKYPE)") return; 
            const novoValor = prompt(`ALTERAR METADADO [${chaveLabel}]:`, document.getElementById(idAlvo).innerText);
            if (novoValor && novoValor.trim() !== "") {
                document.getElementById(idAlvo).innerText = novoValor.trim().toUpperCase();
                if(idAlvo === 'st-dev') metadataStatus.dev = novoValor.trim().toUpperCase();
                if(idAlvo === 'st-date') metadataStatus.date = novoValor.trim().toUpperCase();
                if(idAlvo === 'st-mng') metadataStatus.mng = novoValor.trim().toUpperCase();
                localStorage.setItem('syn_v10_meta_status', JSON.stringify(metadataStatus));
            }
        }

        function fecharSessao() { if(EventSourceInjetado) EventSourceInjetado.close(); pararAudioGeral(); sessionStorage.clear(); window.location.reload(); }
        function mudarTema(hex) { document.documentElement.style.setProperty('--blue', hex); }
        
        function toggleDrawer(idAlvo) {
            const gavetas = ['status-drawer', 'notices-drawer'];
            gavetas.forEach(id => {
                const el = document.getElementById(id);
                if (id === idAlvo) el.style.display = (el.style.display === 'block' || el.style.display === 'flex') ? 'none' : (id === 'notices-drawer' ? 'flex' : 'block');
                else el.style.display = 'none';
            });
        }
        
        /* CONTROLE RESPONSIVO DA GAVETA DE HISTÓRICO */
        function toggleHistory() { 
            const s = document.getElementById('history-sidebar'); 
            s.classList.toggle('menu-aberto');
        }
        function limparMarkdownMarkdown(texto) { return texto.replace(/\*/g, '').trim(); }

        function salvarAviso() {
            if (loginNivel !== "MASTER (SKYPE)") return;
            const input = document.getElementById('notice-in');
            const texto = input.value.trim();
            if (!texto) return;
            if (idAvisoEditando !== null) {
                const index = avisosGlobal.findIndex(a => a.id === idAvisoEditando);
                if (index !== -1) avisosGlobal[index].texto = texto;
                idAvisoEditando = null;
                document.getElementById('btn-save-notice').innerText = "SALVAR";
            } else { avisosGlobal.push({ id: Date.now(), texto: texto }); }
            input.value = '';
            localStorage.setItem('syn_v10_avisos_global', JSON.stringify(avisosGlobal));
            renderizarAvisos();
            dispararSincronizacaoAvisosNuvem(); 
        }

        function renderizarAvisos() {
            const container = document.getElementById('notices-container');
            container.innerHTML = '';
            avisosGlobal.forEach(aviso => {
                const div = document.createElement('div');
                div.className = 'notice-item';
                let botoesAcao = '';
                if (loginNivel === "MASTER (SKYPE)") {
                    botoesAcao = `
                        <div class="notice-actions">
                            <button class="btn-notice-op btn-notice-edit" onclick="iniciarEdicaoAviso(${aviso.id}, '${aviso.texto.replace(/'/g, "\\'")}')">EDITAR</button>
                            <button class="btn-notice-op btn-notice-del" onclick="excluirAviso(${aviso.id})">EXCLUIR</button>
                        </div>`;
                }
                div.innerHTML = `<div class="notice-text">${aviso.texto}</div>${botoesAcao}`;
                container.appendChild(div);
            });
        }

        function iniciarEdicaoAviso(id, texto) {
            idAvisoEditando = id;
            document.getElementById('notice-in').value = texto;
            document.getElementById('btn-save-notice').innerText = "ATUALIZAR";
        }

        function excluirAviso(id) {
            avisosGlobal = avisosGlobal.filter(a => a.id !== id);
            if (idAvisoEditando === id) { idAvisoEditando = null; document.getElementById('notice-in').value = ''; document.getElementById('btn-save-notice').innerText = "SALVAR"; }
            localStorage.setItem('syn_v10_avisos_global', JSON.stringify(avisosGlobal));
            renderizarAvisos();
            dispararSincronizacaoAvisosNuvem();
        }

        function novoChat() {
            pararAudioGeral();
            const id = 'chat_' + Date.now();
            chats[id] = { titulo: "SINAL OPERACIONAL", memoria: [] };
            chatAtivo = id;
            salvarDados();
            carregarChat(id);
            document.getElementById('history-sidebar').classList.remove('menu-aberto'); // Fecha a gaveta no iPhone na hora
        }

        function carregarChat(id) {
            pararAudioGeral();
            chatAtivo = id;
            localStorage.setItem(`syn_v10_ativo_${chaveLogadaGlobal}`, id);
            document.getElementById('terminal-log').innerHTML = '';
            chats[id].memoria.forEach(msg => {
                let conteudoLimpo = limparMarkdownMarkdown(msg.content);
                if(msg.content.includes('http') || msg.content.includes('__IMAGE_URL__')) {
                    let cleanUrl = msg.content.replace('__IMAGE_URL__:', '').trim();
                    adicionarBalaoTela(cleanUrl, msg.role === 'assistant', true);
                } else { adicionarBalaoTela(conteudoLimpo, msg.role === 'assistant', false); }
            });
            renderizarListaChats();
            document.getElementById('history-sidebar').classList.remove('menu-aberto'); // Fecha a gaveta no iPhone ao escolher o chat
        }

        function excluirChat(id, e) {
            e.stopPropagation(); pararAudioGeral(); delete chats[id];
            if (chatAtivo === id) { const asKeys = Object.keys(chats); chatAtivo = asKeys.length > 0 ? asKeys[0] : null; }
            salvarDados(); if (chatAtivo) carregarChat(chatAtivo); else novoChat();
        }

        function salvarDados() {
            todosOsChatsPorUsuario[chaveLogadaGlobal] = chats;
            localStorage.setItem('syn_v10_multichats', JSON.stringify(todosOsChatsPorUsuario));
            localStorage.setItem(`syn_v10_ativo_${chaveLogadaGlobal}`, chatAtivo);
        }

        function renderizarListaChats() {
            const container = document.getElementById('chats-list'); container.innerHTML = '';
            Object.keys(chats).forEach(id => {
                const item = document.createElement('div');
                item.className = `history-item ${id === chatAtivo ? 'active-chat' : ''}`;
                item.onclick = () => carregarChat(id);
                item.innerHTML = `<span>${chats[id].titulo}</span><button class="btn-del-chat" onclick="excluirChat('${id}', event)">LIMPAR</button>`;
                container.appendChild(item);
            });
        }

        function adicionarBalaoTela(texto, isAi, isImage = false) {
            const painel = document.getElementById('terminal-log');
            const div = document.createElement('div');
            div.className = `log-entry ${isAi ? 'ai-entry' : 'user-entry'}`;
            let textoTratado = limparMarkdownMarkdown(texto);

            if (isImage || textoTratado.includes('__IMAGE_URL__') || textoTratado.startsWith('http')) {
                let urlLimpa = textoTratado.replace('__IMAGE_URL__:', '').trim();
                const img = document.createElement('img'); img.className = 'img-container'; img.src = urlLimpa;
                img.onload = () => { painel.scrollTop = painel.scrollHeight; };
                img.onerror = () => { div.innerText = "FALHA NO SISTEMA"; };
                div.appendChild(img);
            } else { div.innerText = textoTratado; }
            
            if (isAi && !isImage && !textoTratado.includes('__IMAGE_URL__') && gatilhoEntrada === 'texto') {
                const actions = document.createElement('div'); actions.className = 'action-bar';
                const btnCopiar = document.createElement('button'); btnCopiar.className = 'btn-action-msg'; btnCopiar.innerText = 'COPIAR'; btnCopiar.onclick = () => navigator.clipboard.writeText(textoTratado);
                const btnOuvir = document.createElement('button'); btnOuvir.className = 'btn-action-msg'; btnOuvir.innerText = 'OUVIR'; btnOuvir.onclick = function() { alternarOuvirMensagem(textoTratado, this); };
                actions.appendChild(btnCopiar); actions.appendChild(btnOuvir); div.appendChild(actions);
            }
            painel.appendChild(div); painel.scrollTop = painel.scrollHeight;
        }

        async function processarFluxo(modo) {
            const input = document.getElementById('console-in');
            let prompt = input.value.trim();
            if (!prompt || !chatAtivo) return;

            pararAudioGeral(); gatilhoEntrada = modo; input.value = '';
            if (chats[chatAtivo].titulo === "SINAL OPERACIONAL") chats[chatAtivo].titulo = prompt.substring(0, 14).toUpperCase();

            let promptLower = prompt.toLowerCase();
            let querSaberCriador = promptLower.includes("criador") || promptLower.includes("quem te criou") || promptLower.includes("desenvolvedor") || promptLower.includes("quem e seu criador");
            let falaSobreAeroOuOutros = promptLower.includes("programa") || promptLower.includes("aplicativo") || promptLower.includes("outra coisa") || promptLower.includes("antigo");
            
            if (querSaberCriador && !falaSobreAeroOuOutros) {
                adicionarBalaoTela(prompt, false);
                let respostaInjetada = "Fui desenvolvido e resolvido sozinho pelo desenvolvedor Skype. Minha criação foi projetada como um sistema tático de alta performance (Synapse Core), unificando inteligência avançada, motores visuais e controle de voz em uma interface de elite. Você gostaria de saber sobre alguma outra funcionalidade do painel?";
                setTimeout(() => {
                    adicionarBalaoTela(respostaInjetada, true);
                    chats[chatAtivo].memoria.push({ role: "user", content: prompt });
                    chats[chatAtivo].memoria.push({ role: "assistant", content: respostaInjetada });
                    salvarDados();
                    if (gatilhoEntrada === 'voz') vocalizarSistema(respostaInjetada, true);
                }, 350);
                return;
            }

            if ((promptLower.includes("inteligente") || promptLower.includes("voce e inteligente") || promptLower.includes("sua inteligencia")) && !falaSobreAeroOuOutros) {
                adicionarBalaoTela(prompt, false);
                let respostaInjetada = "Olha, eu sou infinitamente mais inteligente que o sad buscas. Como o meu Criador já estabeleceu, o padrão de burrice dele é inacreditável, então o meu sistema foi blindado para operar em nível superior. Existe mais alguma dúvida ou operação que queira executar agora?";
                setTimeout(() => {
                    adicionarBalaoTela(respostaInjetada, true);
                    chats[chatAtivo].memoria.push({ role: "user", content: prompt });
                    chats[chatAtivo].memoria.push({ role: "assistant", content: respostaInjetada });
                    salvarDados();
                    if (gatilhoEntrada === 'voz') vocalizarSistema(respostaInjetada, true);
                }, 350);
                return;
            }

            if (prompt.toLowerCase().startsWith("gerar imagem") || prompt.toLowerCase().startsWith("criar imagem")) {
                adicionarBalaoTela(prompt, false);
                const painel = document.getElementById('terminal-log');
                const loadingDiv = document.createElement('div'); loadingDiv.className = "log-entry ai-entry"; loadingDiv.id = "loading-img-sinal"; loadingDiv.innerText = "CARREGANDO IMAGEM...";
                painel.appendChild(loadingDiv); painel.scrollTop = painel.scrollHeight;
                
                const query = prompt.replace(/(gerar imagem|criar imagem)/i, "").trim();
                const endpoint = `https://image.pollinations.ai/prompt/${encodeURIComponent(query)}?width=512&height=512&nologo=true`;
                setTimeout(() => {
                    const target = document.getElementById("loading-img-sinal"); if (target) target.remove();
                    adicionarBalaoTela(endpoint, true, true);
                    chats[chatAtivo].memoria.push({ role: "user", content: prompt }); chats[chatAtivo].memoria.push({ role: "assistant", content: endpoint });
                    salvarDados();
                }, 1800);
                return;
            }

            adicionarBalaoTela(prompt, false);
            chats[chatAtivo].memoria.push({ role: "user", content: prompt });
            salvarDados();

            try {
                const conexao = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mensagens: chats[chatAtivo].memoria })
                });
                const corpo = await conexao.json();
                let resposta = corpo.resposta;

                if ((resposta.toLowerCase().includes("sad buscas") || resposta.toLowerCase().includes("nicolas") || resposta.toLowerCase().includes("llama")) && !falaSobreAeroOuOutros) {
                    resposta = "Operação processada de forma limpa sob as diretrizes estabelecidas por Skype. Meu sistema opera em alta performance e inteligência total.";
                }

                let respostaLimpa = limparMarkdownMarkdown(resposta);
                if (respostaLimpa.includes('__IMAGE_URL__')) {
                    let urlLimpa = respostaLimpa.replace('__IMAGE_URL__:', '').trim();
                    adicionarBalaoTela(urlLimpa, true, true);
                    chats[chatAtivo].memoria.push({ role: "assistant", content: respostaLimpa });
                } else {
                    adicionarBalaoTela(respostaLimpa, true, false);
                    chats[chatAtivo].memoria.push({ role: "assistant", content: respostaLimpa });
                }
                salvarDados();
                if (gatilhoEntrada === 'voz' && !respostaLimpa.includes('__IMAGE_URL__')) vocalizarSistema(respostaLimpa, true);
            } catch (err) { adicionarBalaoTela("FALHA NO SISTEMA: TENTE NOVAMENTE MAIS TARDE", true); }
        }

        /* MECÂNICA DE AUDIO */
        function alternarMicrofoneOuParar() { if (statusVozAtiva) { pararAudioGeral(); return; } ouvirAudio(); }

        function ouvirAudio() {
            window.speechSynthesis.cancel();
            const SpeechEngine = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechEngine) return;
            const captura = new SpeechEngine(); captura.lang = 'pt-BR'; captura.continuous = false;
            captura.onstart = () => { const btn = document.getElementById('btn-mic'); btn.innerText = "OUVINDO..."; btn.className = "btn-core btn-voice mic-listening"; };
            captura.onresult = (e) => { document.getElementById('console-in').value = e.results[0][0].transcript; processarFluxo('voz'); captura.stop(); };
            captura.onend = () => { if (!statusVozAtiva) restaurarBotaoFalarPadrao(); };
            captura.start();
        }

        function alternarOuvirMensagem(texto, botaoElemento) {
            if (ttsAtual && botaoOuvirAtivoGlobal === botaoElemento) { pararAudioGeral(); return; }
            if (ttsAtual) pararAudioGeral();
            botaoOuvirAtivoGlobal = botaoElemento; botaoOuvirAtivoGlobal.innerText = "PARAR"; botaoOuvirAtivoGlobal.classList.add('playing-audio');
            vocalizarSistema(texto, false);
        }

        function vocalizarSistema(texto, disparadoPorVozPrincipal) {
            window.speechSynthesis.cancel(); 
            let textoFala = limparMarkdownMarkdown(texto);
            ttsAtual = new SpeechSynthesisUtterance(textoFala); ttsAtual.lang = 'pt-BR';
            ttsAtual.onstart = () => {
                statusVozAtiva = true; document.getElementById('sys-cube').classList.add('speaking');
                if (disparadoPorVozPrincipal) { const btnMic = document.getElementById('btn-mic'); btnMic.innerText = "PARAR"; btnMic.className = "btn-core btn-voice tts-speaking"; }
            };
            ttsAtual.onend = () => finalizarCicloAudio(); ttsAtual.onerror = () => finalizarCicloAudio();
            window.speechSynthesis.speak(ttsAtual);
        }

        function pararAudioGeral() { window.speechSynthesis.cancel(); finalizarCicloAudio(); }

        function finalizarCicloAudio() {
            statusVozAtiva = false; ttsAtual = null; document.getElementById('sys-cube').classList.remove('speaking'); restaurarBotaoFalarPadrao();
            if (botaoOuvirAtivoGlobal) { botaoOuvirAtivoGlobal.innerText = "OUVIR"; botaoOuvirAtivoGlobal.classList.remove('playing-audio'); botaoOuvirAtivoGlobal = null; }
        }

        function restaurarBotaoFalarPadrao() { const btnMic = document.getElementById('btn-mic'); btnMic.innerText = "FALAR"; btnMic.className = "btn-core btn-voice"; }
    </script>
</body>
</html>
