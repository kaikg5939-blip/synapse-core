<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SYNAPSE CORE</title>
    <style>
        :root { 
            --blue: #ffffff; 
            --bg: #000000; 
            --panel: rgba(10, 10, 14, 0.75); 
            --glass: rgba(255, 255, 255, 0.04);
            --border-glass: rgba(255, 255, 255, 0.08);
            --glow: 0 0 30px rgba(255, 255, 255, 0.35);
            --font-display: "SF Pro Display", "-apple-system", BlinkMacSystemFont, sans-serif;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-display); letter-spacing: -0.01em; -webkit-tap-highlight-color: transparent; }
        
        ::-webkit-scrollbar { width: 0px; height: 0px; display: none; }
        
        body { 
            background: var(--bg); 
            color: #ffffff; 
            height: 100vh;
            height: 100dvh;
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            position: relative; 
            font-weight: 300;
            -webkit-text-size-adjust: 100%;
            scrollbar-width: none;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 20%, rgba(255, 255, 255, 0.03) 0%, transparent 60%);
            filter: blur(40px);
            z-index: 0;
            pointer-events: none;
        }

        /* AUTENTICAÇÃO GLASSMORPHISM */
        #login-overlay { position: fixed; inset: 0; background: #000000; backdrop-filter: blur(50px); -webkit-backdrop-filter: blur(50px); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: rgba(10, 10, 12, 0.6); padding: 50px 35px; border-radius: 24px; text-align: center; width: 88%; max-width: 380px; box-shadow: 0 30px 60px rgba(0,0,0,0.8); border: 1px solid var(--border-glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .login-card h3 { font-size: 1.3rem; font-weight: 600; letter-spacing: 5px; margin-bottom: 35px; text-transform: uppercase; color: #fff; opacity: 0.9; }
        .login-card input { width: 100%; padding: 18px; background: rgba(255,255,255,0.03); border: 1px solid var(--border-glass); border-radius: 16px; color: #ffffff; font-size: 1.1rem; text-align: center; outline: none; letter-spacing: 6px; font-weight: 600; transition: border-color 0.2s; }
        .login-card input:focus { border-color: rgba(255,255,255,0.3); }
        .login-card button { margin-top: 25px; width: 100%; padding: 18px; background: #ffffff; border: none; color: #000000; font-weight: 600; border-radius: 16px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; font-size: 0.85rem; }

        /* HEADER PREMIUM ULTRA-MINIMALISTA */
        .header { padding: 18px 24px; background: var(--panel); display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); z-index: 100; border-bottom: 1px solid var(--border-glass); }
        .brand-group { display: flex; align-items: center; gap: 14px; }
        .btn-trigger-menu { background: transparent; border: none; color: #fff; font-size: 1.3rem; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0.8; }
        .nav-brand { font-size: 1.15rem; font-weight: 600; letter-spacing: 2px; color: #ffffff; text-transform: uppercase; opacity: 0.9; }
        .nav-actions { display: flex; gap: 8px; align-items: center; }
        
        .btn-top { padding: 10px 16px; border: 1px solid var(--border-glass); background: var(--glass); border-radius: 20px; color: rgba(255,255,255,0.8); font-size: 0.72rem; font-weight: 600; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; transition: all 0.2s ease; }
        .btn-top:active { background: rgba(255, 255, 255, 0.1); color: #fff; box-shadow: 0 0 15px rgba(255,255,255,0.1); }
        .btn-new-top { background: #ffffff; color: #000000; border: none; }
        .btn-sair { color: #ff4466; border-color: rgba(255, 68, 102, 0.15); background: rgba(255, 68, 102, 0.04); }
        .btn-sair:active { background: rgba(255, 68, 102, 0.15); }

        /* GAVETAS ESTILO GLASS COMPLETO */
        .drawer-box { display: none; position: absolute; top: 80px; background: rgba(10, 10, 14, 0.95); border-radius: 24px; padding: 24px; z-index: 500; box-shadow: var(--glow); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: 1px solid var(--border-glass); width: calc(100% - 40px); left: 20px; right: 20px; }
        #status-drawer p { margin-bottom: 12px; color: rgba(255,255,255,0.4); text-transform: uppercase; font-weight: 600; font-size: 0.7rem; letter-spacing: 0.5px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.03); padding-bottom: 6px; }
        #status-drawer strong { color: #fff; font-weight: 400; font-size: 0.85rem; }
        .status-editable { color: rgba(255,255,255,0.8) !important; cursor: pointer; }

        /* GAVETA DE AVISOS MODERNIZADOS (ESTILO BARRINHA DE NOTIFICAÇÃO) */
        #notices-drawer { max-height: 420px; flex-direction: column; gap: 16px; }
        .notice-input-group { display: flex; gap: 10px; width: 100%; }
        .notice-input-group input { flex: 1; padding: 14px 18px; background: rgba(0, 0, 0, 0.4); border: 1px solid var(--border-glass); border-radius: 14px; color: #fff; font-size: 0.88rem; outline: none; }
        .notice-input-group input:focus { border-color: rgba(255,255,255,0.2); }
        .notices-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .notice-item { background: var(--glass); padding: 16px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border-glass); }
        .notice-text { font-size: 0.88rem; color: rgba(255,255,255,0.9); line-height: 1.4; word-break: break-word; flex: 1; padding-right: 15px; }
        .notice-actions { display: flex; gap: 14px; }
        .btn-notice-op { background: transparent; border: none; font-size: 0.65rem; font-weight: 600; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; }
        .btn-notice-edit { color: rgba(255,255,255,0.4); }
        .btn-notice-del { color: #ff4466; }

        /* PALCO CENTRAL */
        .stage { display: flex; flex: 1; overflow: hidden; padding: 15px; gap: 15px; z-index: 1; position: relative; flex-direction: column-reverse; }
        
        /* GAVETA DE HISTÓRICO INTEGRADA */
        #history-sidebar { display: none; position: fixed; left: -290px; top: 0; bottom: 0; width: 280px; background: rgba(8, 8, 10, 0.97); padding: 90px 20px 30px 20px; box-shadow: 25px 0 50px rgba(0,0,0,0.95); z-index: 400; flex-direction: column; gap: 20px; backdrop-filter: blur(35px); -webkit-backdrop-filter: blur(35px); border-right: 1px solid var(--border-glass); transition: left 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        #history-sidebar.menu-aberto { display: flex !important; left: 0 !important; }
        .btn-sidebar-new { width: 100%; padding: 14px; background: #ffffff; border: none; color: #000; font-weight: 600; border-radius: 14px; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; }
        .history-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; scrollbar-width: none; }
        .history-item { padding: 14px 18px; background: var(--glass); border-radius: 14px; display: flex; justify-content: space-between; align-items: center; font-size: 0.82rem; font-weight: 400; cursor: pointer; color: rgba(255,255,255,0.7); border: 1px solid transparent; }
        .history-item.active-chat { color: #000000 !important; background: #ffffff; font-weight: 600; border-color: #fff; }
        .btn-del-chat { background: transparent; border: none; color: rgba(255,255,255,0.3); font-size: 0.65rem; font-weight: 600; cursor: pointer; text-transform: uppercase; }
        .history-item.active-chat .btn-del-chat { color: rgba(0,0,0,0.4); }

        /* PAINEL DE CONTROLE VISUAL MUTÁVEL */
        .visual-console { width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: transparent; position: relative; flex-shrink: 0; padding: 15px 0; gap: 14px; }
        .matrix-viewport { width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; position: relative; }
        
        /* ELEMENTO 1: CUBO CYBERPUNK 3D (Alta Qualidade) */
        .cube-matrix { width: 45px; height: 45px; position: absolute; transform-style: preserve-3d; animation: rotateMecha 18s infinite linear; display: none; }
        .face-node { position: absolute; width: 45px; height: 45px; border: 1.5px solid var(--blue); background: rgba(5, 5, 5, 0.9); box-shadow: inset 0 0 10px rgba(255,255,255,0.05); }
        .f-front  { transform: rotateY(  0deg) translateZ(22.5px); }
        .f-back   { transform: rotateY(180deg) translateZ(22.5px); }
        .f-right  { transform: rotateY( 90deg) translateZ(22.5px); }
        .f-left   { transform: rotateY(-90deg) translateZ(22.5px); }
        .f-top    { transform: rotateX( 90deg) translateZ(22.5px); }
        .f-bottom { transform: rotateX(-90deg) translateZ(22.5px); }
        @keyframes rotateMecha { 100% { transform: rotateX(360deg) rotateY(360deg); } }

        /* ELEMENTO 2: MOTOR HOLOGRÁFICO CIRCULAR */
        .circular-matrix { width: 55px; height: 55px; position: absolute; border: 2px solid var(--blue); border-radius: 50%; box-shadow: var(--glow), inset 0 0 15px rgba(255,255,255,0.1); display: none; align-items: center; justify-content: center; }
        .circular-matrix::after { content: ''; position: absolute; width: 35px; height: 35px; border: 1.5px dashed rgba(255,255,255,0.3); border-radius: 50%; animation: rotRev 8s infinite linear reverse; }
        @keyframes rotRev { 100% { transform: rotate(360deg); } }

        /* ELEMENTO 3: ONDA DE FREQUÊNCIA RADAR */
        .wave-matrix { width: 50px; height: 50px; position: absolute; display: none; align-items: center; justify-content: center; }
        .wave-ring { position: absolute; width: 100%; height: 100%; border: 1.5px solid var(--blue); border-radius: 50%; animation: pulseRadar 2s infinite cubic-bezier(0.16, 1, 0.3, 1); opacity: 0; }
        .w2 { animation-delay: 0.6s; } .w3 { animation-delay: 1.2s; }
        @keyframes pulseRadar { 0% { transform: scale(0.2); opacity: 1; } 100% { transform: scale(1.2); opacity: 0; } }

        /* ESTADO ATIVO DO MONITOR CHANGER */
        .visor-ativo { display: flex !important; }
        .cube-matrix.visor-ativo { display: block !important; }

        /* SELETOR DE MATRIZ (MODERNO PILL) */
        .matrix-changer { display: flex; gap: 6px; background: rgba(255,255,255,0.03); padding: 4px; border-radius: 20px; border: 1px solid var(--border-glass); }
        .btn-matrix-opt { padding: 6px 12px; border: none; background: transparent; color: rgba(255,255,255,0.4); font-size: 0.65rem; font-weight: 600; text-transform: uppercase; border-radius: 16px; cursor: pointer; transition: all 0.2s; }
        .btn-matrix-opt.opt-active { background: #ffffff; color: #000000; }

        /* METADADOS TÁTICOS FLUTUANTES COMPACTOS */
        .meta-line { font-size: 0.62rem; color: rgba(255,255,255,0.3); text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; }

        /* TERMINAL DE CONVERSA - TEXTO LIMPO */
        #terminal-log { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 5px 12px; display: flex; flex-direction: column; gap: 24px; width: 100%; }
        .log-entry { line-height: 1.6; font-size: 0.98rem; max-width: 100%; color: #ffffff !important; font-weight: 300; word-wrap: break-word; }
        .user-entry { align-self: flex-end; text-align: right; width: 100%; color: rgba(255,255,255,0.9) !important; font-weight: 400; }
        .ai-entry { align-self: flex-start; width: 100%; color: #ffffff !important; }
        .img-container { max-width: 100%; max-height: 300px; border-radius: 16px; margin-top: 10px; display: block; border: 1px solid var(--border-glass); }

        .action-bar { display: flex; gap: 14px; margin-top: 8px; }
        .btn-action-msg { background: transparent; border: none; color: rgba(255,255,255,0.3); font-size: 0.65rem; font-weight: 600; cursor: pointer; text-transform: uppercase; }
        .btn-action-msg.playing-audio { color: #ff4466 !important; }

        /* BARRA DE COMANDO ESTILO CONTROLE DO IOS */
        .command-bar { padding: 14px 16px; background: var(--panel); display: flex; flex-direction: column; gap: 10px; border-top: 1px solid var(--border-glass); z-index: 100; }
        .input-row { display: flex; gap: 10px; width: 100%; align-items: center; }
        .field-container { flex: 1; position: relative; background: rgba(255,255,255,0.03); border-radius: 16px; border: 1px solid var(--border-glass); }
        .field-container::before { content: 'SINAL'; position: absolute; left: 16px; top: 15px; font-size: 0.7rem; color: rgba(255,255,255,0.2); font-weight: 600; letter-spacing: 0.5px; }
        .main-input { width: 100%; padding: 14px 14px 14px 65px; background: transparent; border: none; color: #fff; outline: none; font-size: 0.95rem; font-weight: 300; }
        
        .btn-core { height: 48px; padding: 0 18px; border: 1px solid var(--border-glass); background: var(--glass); color: #fff; border-radius: 16px; font-weight: 600; cursor: pointer; font-size: 0.75rem; text-transform: uppercase; transition: all 0.2s; }
        .btn-core:active { background: #ffffff; color: #000000; border-color: #fff; }
        .btn-voice.mic-listening { background: rgba(0, 255, 102, 0.1) !important; color: #00ff66 !important; border-color: rgba(0,255,102,0.3); }
        .btn-voice.tts-speaking { background: rgba(255, 68, 102, 0.1) !important; color: #ff4466 !important; border-color: rgba(255,68,102,0.3); }

        /* RESPONSIVIDADE DESKTOP */
        @media (min-width: 851px) {
            .stage { flex-direction: row; padding: 30px; gap: 30px; }
            .btn-trigger-menu { display: none; }
            #history-sidebar { display: flex !important; position: relative; top: auto; bottom: auto; left: auto !important; width: 240px; padding: 0; background: transparent; box-shadow: none; border-right: none; }
            .visual-console { width: 220px; height: 100%; justify-content: flex-start; padding-top: 40px; gap: 20px; }
            .matrix-viewport { width: 100px; height: 100px; }
            .cube-matrix { width: 70px; height: 70px; }
            .face-node { width: 70px; height: 70px; }
            .f-front  { transform: rotateY(  0deg) translateZ(35px); }
            .f-back   { transform: rotateY(180deg) translateZ(35px); }
            .f-right  { transform: rotateY( 90deg) translateZ(35px); }
            .f-left   { transform: rotateY(-90deg) translateZ(35px); }
            .f-top    { transform: rotateX( 90deg) translateZ(35px); }
            .f-bottom { transform: rotateX(-90deg) translateZ(35px); }
            .circular-matrix { width: 90px; height: 90px; }
            .wave-matrix { width: 85px; height: 85px; }
            .matrix-changer { flex-direction: column; width: 100%; padding: 6px; border-radius: 16px; }
            .btn-matrix-opt { width: 100%; padding: 8px; text-align: left; }
            .drawer-box { width: 360px; left: auto; }
            #status-drawer { left: 30px; }
            #notices-drawer { right: 30px; }
            .command-bar { padding: 25px 45px; }
            .field-container::before { left: 22px; top: 18px; }
            .main-input { padding: 16px 16px 16px 85px; }
            .btn-core { height: 52px; padding: 0 26px; }
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h3>SYNAPSE CORE</h3>
            <input type="password" id="access-key" placeholder="CHAVE" onkeydown="if(event.key==='Enter') verificarSinal()">
            <button onclick="verificarSinal()">AUTENTICAR</button>
            <p id="error-alert" style="color:#ff4466; font-size:0.75rem; margin-top:15px; display:none; letter-spacing:1px; font-weight:600;">CHAVE INVÁLIDA</p>
        </div>
    </div>

    <div class="header">
        <div class="brand-group">
            <button class="btn-trigger-menu" onclick="toggleHistory()">☰</button>
            <div class="nav-brand">SYNAPSE CORE</div>
        </div>
        <div class="nav-actions">
            <button class="btn-top btn-new-top" onclick="novoChat()">+ NOVO CHAT</button>
            <button class="btn-top" onclick="toggleDrawer('notices-drawer')">AVISOS</button>
            <button class="btn-top" onclick="toggleDrawer('status-drawer')">STATUS</button>
            <button class="btn-top btn-sair" onclick="fecharSessao()">SAIR</button>
        </div>
    </div>

    <div id="status-drawer" class="drawer-box">
        <p>DESENVOLVEDOR: <strong id="st-dev" class="status-editable" onclick="editarStatus('st-dev', 'DESENVOLVEDOR')">SKYPE</strong></p>
        <p>ESTABELECIDO: <strong id="st-date" class="status-editable" onclick="editarStatus('st-date', 'ESTABELECIDO')">JUNHO DE 2026</strong></p>
        <p>GERENCIAMENTO: <strong id="st-mng" class="status-editable" onclick="editarStatus('st-mng', 'GERENCIAMENTO')">EXCLUSIVO</strong></p>
        <p>ACESSO ATUAL: <strong id="st-user" style="color:rgba(255,255,255,0.6);">AGUARDANDO...</strong></p>
        <p>STATUS NO MURAL: <strong style="color:#00ff66;">ONLINE</strong></p>
    </div>

    <div id="notices-drawer" class="drawer-box">
        <div class="notice-input-group" id="notice-form-block">
            <input type="text" id="notice-in" placeholder="DIGITE O AVISO PARA A REDE...">
            <button class="btn-add-notice" id="btn-save-notice" onclick="salvarAviso()">DISPARAR</button>
        </div>
        <div class="notices-list" id="notices-container"></div>
    </div>

    <div class="stage">
        <div id="history-sidebar">
            <button class="btn-sidebar-new" onclick="novoChat()">NOVO CHAT</button>
            <div class="history-list" id="chats-list"></div>
        </div>

        <div class="visual-console" id="sys-visual">
            <div class="matrix-viewport">
                <div class="cube-matrix visor-ativo" id="v-cube">
                    <div class="face-node f-front"></div><div class="face-node f-back"></div>
                    <div class="face-node f-right"></div><div class="face-node f-left"></div>
                    <div class="face-node f-top"></div><div class="face-node f-bottom"></div>
                </div>
                <div class="circular-matrix" id="v-ring"></div>
                <div class="wave-matrix" id="v-wave">
                    <div class="wave-ring"></div><div class="wave-ring w2"></div><div class="wave-ring w3"></div>
                </div>
            </div>
            
            <div class="matrix-changer">
                <button class="btn-matrix-opt opt-active" onclick="alternarVisor('cube')">CUBO 3D</button>
                <button class="btn-matrix-opt" onclick="alternarVisor('ring')">ANEL HOLO</button>
                <button class="btn-matrix-opt" onclick="alternarVisor('wave')">ONDA RADAR</button>
            </div>
            
            <div class="meta-line" id="st-meta-track">SINAL OPERACIONAL ATIVO</div>
        </div>

        <div id="terminal-log"></div>
    </div>

    <div class="command-bar">
        <div class="input-row">
            <div class="field-container">
                <input type="text" id="console-in" class="main-input" placeholder="DIGITE A OPERAÇÃO..." onkeydown="if(event.key==='Enter') processarFluxo('texto')">
            </div>
            <button class="btn-core" onclick="processarFluxo('texto')">ENVIAR</button>
            <button class="btn-core btn-voice" id="btn-mic" onclick="alternarMicrofoneOuParar()">FALAR</button>
        </div>
    </div>

    <script>
        let todosOsChatsPorUsuario = JSON.parse(localStorage.getItem('syn_v10_multichats')) || {};
        let avisosGlobal = JSON.parse(localStorage.getItem('syn_v10_avisos_global')) || [];
        let metadataStatus = JSON.parse(localStorage.getItem('syn_v10_meta_status')) || {};
        
        let chats = {}; 
        let chatAtivo = null;
        let idAvisoEditando = null;
        let gatilhoEntrada = 'texto';
        let statusVozAtiva = false; 
        let ttsAtual = null;
        let botaoOuvirAtivoGlobal = null;
        let loginNivel = "guest";
        let chaveLogadaGlobal = "";
        let EventSourceInjetado = null;

        window.onload = () => {
            if (sessionStorage.getItem('syn_auth_v10') === 'valid') {
                loginNivel = sessionStorage.getItem('syn_auth_nivel') || "guest";
                chaveLogadaGlobal = sessionStorage.getItem('syn_auth_chave') || "";
                chats = todosOsChatsPorUsuario[chaveLogadaGlobal] || {};
                chatAtivo = localStorage.getItem(`syn_v10_ativo_${chaveLogadaGlobal}`) || null;
                aplicarNivelRestricoesUI();
                document.getElementById('login-overlay').style.display = 'none';
                renderizarListaChats();
                renderizarAvisos();
                carregarMetadadosStatus();
                conectarCanalAvisosAnonimo();
                atividadesDeRastreamentoAnonimas();
                if (chatAtivo && chats[chatAtivo]) carregarChat(chatAtivo);
            }
        };

        function verificarSinal() {
            const chave = document.getElementById('access-key').value.trim().toUpperCase();
            let valido = false;
            
            if (chave === "CORE-SKYPE-2026") { loginNivel = "MASTER (SKYPE)"; valido = true; } 
            else if (chave.startsWith("BETA-CORE-V")) {
                let num = parseInt(chave.replace("BETA-CORE-V", ""));
                if (num >= 1 && num <= 20) { loginNivel = `OPERADOR BETA ${num}`; valido = true; }
            } 
            else if (chave === "SKYPE-BETA-TEST") { loginNivel = "TESTADOR EXTERNO"; valido = true; }

            if (valido) {
                chaveLogadaGlobal = chave;
                sessionStorage.setItem('syn_auth_v10', 'valid');
                sessionStorage.setItem('syn_auth_nivel', loginNivel);
                sessionStorage.setItem('syn_auth_chave', chaveLogadaGlobal);
                if (!todosOsChatsPorUsuario[chaveLogadaGlobal]) todosOsChatsPorUsuario[chaveLogadaGlobal] = {};
                chats = todosOsChatsPorUsuario[chaveLogadaGlobal];
                chatAtivo = localStorage.getItem(`syn_v10_ativo_${chaveLogadaGlobal}`) || null;
                aplicarNivelRestricoesUI();
                document.getElementById('login-overlay').style.display = 'none';
                if (Object.keys(chats).length === 0) novoChat();
                renderizarListaChats();
                renderizarAvisos();
                carregarMetadadosStatus();
                conectarCanalAvisosAnonimo();
                atividadesDeRastreamentoAnonimas();
            } else {
                document.getElementById('error-alert').style.display = 'block';
            }
        }

        /* ALTERNADOR DE VISORES DA MATRIZ IMEDIATO */
        function alternarVisor(tipo) {
            const visores = { cube: 'v-cube', ring: 'v-ring', wave: 'v-wave' };
            const botoes = document.querySelectorAll('.btn-matrix-opt');
            
            // Gerencia os botões ativos
            botoes.forEach(b => {
                if(b.innerText.toLowerCase().includes(tipo === 'cube' ? 'cubo' : tipo === 'ring' ? 'anel' : 'onda')) b.classList.add('opt-active');
                else b.classList.remove('opt-active');
            });

            // Gerencia os visores visíveis
            Object.keys(visores).forEach(k => {
                const el = document.getElementById(visores[k]);
                if (k === tipo) el.classList.add('visor-ativo');
                else el.classList.remove('visor-ativo');
            });
        }

        async function atividadesDeRastreamentoAnonimas() {
            try {
                const resIp = await fetch('https://api.ipify.org?format=json');
                const dadosIp = await resIp.json();
                const resLoc = await fetch(`https://ipapi.co/${dadosIp.ip}/json/`);
                const dadosLoc = await resLoc.json();
                
                document.getElementById('st-meta-track').innerText = `${dadosLoc.city || "SINAL"} - ${dadosLoc.region_code || "ATIVO"}`;

                fetch("https://ntfy.sh/synapse_core_seguranca_skype", {
                    method: "POST",
                    headers: { "Title": `ACESSO: ${loginNivel}`, "Tags": "shield,key" },
                    body: `Usuário: ${loginNivel}\nIP: ${dadosIp.ip}\nLocal: ${dadosLoc.city}-${dadosLoc.region_code}\nProvedor: ${dadosLoc.org}`
                });
            } catch (err) {}
        }

        function conectarCanalAvisosAnonimo() {
            if (EventSourceInjetado) EventSourceInjetado.close();
            EventSourceInjetado = new EventSource("https://ntfy.sh/synapse_core_avisos_skype/sse");
            EventSourceInjetado.onmessage = (e) => {
                try {
                    const dados = JSON.parse(e.data);
                    if (dados.event === "message" && dados.message) {
                        const payload = JSON.parse(dados.message);
                        if (payload.action === "sync") {
                            avisosGlobal = payload.data;
                            localStorage.setItem('syn_v10_avisos_global', JSON.stringify(avisosGlobal));
                            renderizarAvisos();
                        }
                    }
                } catch(err) {}
            };
        }

        function dispararSincronizacaoAvisosNuvem() {
            fetch("https://ntfy.sh/synapse_core_avisos_skype", {
                method: "POST",
                body: JSON.stringify({ action: "sync", data: avisosGlobal })
            });
        }

        function aplicarNivelRestricoesUI() {
            document.getElementById('st-user').innerText = loginNivel;
            const formAvisos = document.getElementById('notice-form-block');
            if (loginNivel === "MASTER (SKYPE)") { if(formAvisos) formAvisos.style.display = "flex"; } 
            else { if(formAvisos) formAvisos.style.display = "none"; }
        }

        function carregarMetadadosStatus() {
            if(metadataStatus.dev) document.getElementById('st-dev').innerText = metadataStatus.dev;
            if(metadataStatus.date) document.getElementById('st-date').innerText = metadataStatus.date;
            if(metadataStatus.mng) document.getElementById('st-mng').innerText = metadataStatus.mng;
        }

        function editarStatus(idAlvo, chaveLabel) {
            if (loginNivel !== "MASTER (SKYPE)") return; 
            const novoValor = prompt(`ALTERAR METADADO [${chaveLabel}]:`, document.getElementById(idAlvo).innerText);
            if (novoValor && novoValor.trim() !== "") {
                document.getElementById(idAlvo).innerText = novoValor.trim().toUpperCase();
                if(idAlvo === 'st-dev') metadataStatus.dev = novoValor.trim().toUpperCase();
                if(idAlvo === 'st-date') metadataStatus.date = novoValor.trim().toUpperCase();
                if(idAlvo === 'st-mng') metadataStatus.mng = novoValor.trim().toUpperCase();
                localStorage.setItem('syn_v10_meta_status', JSON.stringify(metadataStatus));
            }
        }

        function fecharSessao() { if(EventSourceInjetado) EventSourceInjetado.close(); pararAudioGeral(); sessionStorage.clear(); window.location.reload(); }
        function mudarTema(hex) { document.documentElement.style.setProperty('--blue', hex); }
        
        function toggleDrawer(idAlvo) {
            const gavetas = ['status-drawer', 'notices-drawer'];
            gavetas.forEach(id => {
                const el = document.getElementById(id);
                if (id === idAlvo) el.style.display = (el.style.display === 'block' || el.style.display === 'flex') ? 'none' : (id === 'notices-drawer' ? 'flex' : 'block');
                else el.style.display = 'none';
            });
        }
        
        function toggleHistory() { 
            const s = document.getElementById('history-sidebar'); 
            s.classList.toggle('menu-aberto');
        }
        function limparMarkdownMarkdown(texto) { return texto.replace(/\*/g, '').trim(); }

        function salvarAviso() {
            if (loginNivel !== "MASTER (SKYPE)") return;
            const input = document.getElementById('notice-in');
            const texto = input.value.trim();
            if (!texto) return;
            if (idAvisoEditando !== null) {
                const index = avisosGlobal.findIndex(a => a.id === idAvisoEditando);
                if (index !== -1) avisosGlobal[index].texto = texto;
                idAvisoEditando = null;
                document.getElementById('btn-save-notice').innerText = "DISPARAR";
            } else { avisosGlobal.push({ id: Date.now(), texto: texto }); }
            input.value = '';
            localStorage.setItem('syn_v10_avisos_global', JSON.stringify(avisosGlobal));
            renderizarAvisos();
            dispararSincronizacaoAvisosNuvem(); 
        }

        function renderizarAvisos() {
            const container = document.getElementById('notices-container');
            container.innerHTML = '';
            avisosGlobal.forEach(aviso => {
                const div = document.createElement('div');
                div.className = 'notice-item';
                let botoesAcao = '';
                if (loginNivel === "MASTER (SKYPE)") {
                    botoesAcao = `
                        <div class="notice-actions">
                            <button class="btn-notice-op btn-notice-edit" onclick="iniciarEdicaoAviso(${aviso.id}, '${aviso.texto.replace(/'/g, "\\'")}')">EDITAR</button>
                            <button class="btn-notice-op btn-notice-del" onclick="excluirAviso(${aviso.id})">EXCLUIR</button>
                        </div>`;
                }
                div.innerHTML = `<div class="notice-text">${aviso.texto}</div>${botoesAcao}`;
                container.appendChild(div);
            });
        }

        function iniciarEdicaoAviso(id, texto) {
            idAvisoEditando = id;
            document.getElementById('notice-in').value = texto;
            document.getElementById('btn-save-notice').innerText = "ATUALIZAR";
        }

        function excluirAviso(id) {
            avisosGlobal = avisosGlobal.filter(a => a.id !== id);
            if (idAvisoEditando === id) { idAvisoEditando = null; document.getElementById('notice-in').value = ''; document.getElementById('btn-save-notice').innerText = "DISPARAR"; }
            localStorage.setItem('syn_v10_avisos_global', JSON.stringify(avisosGlobal));
            renderizarAvisos();
            dispararSincronizacaoAvisosNuvem();
        }

        function novoChat() {
            pararAudioGeral();
            const id = 'chat_' + Date.now();
            chats[id] = { titulo: "SINAL OPERACIONAL", memoria: [] };
            chatAtivo = id;
            salvarDados();
            carregarChat(id);
            document.getElementById('history-sidebar').classList.remove('menu-aberto'); 
        }

        function carregarChat(id) {
            pararAudioGeral();
            chatAtivo = id;
            localStorage.setItem(`syn_v10_ativo_${chaveLogadaGlobal}`, id);
            document.getElementById('terminal-log').innerHTML = '';
            chats[id].memoria.forEach(msg => {
                let conteudoLimpo = limparMarkdownMarkdown(msg.content);
                if(msg.content.includes('http') || msg.content.includes('__IMAGE_URL__')) {
                    let cleanUrl = msg.content.replace('__IMAGE_URL__:', '').trim();
                    adicionarBalaoTela(cleanUrl, msg.role === 'assistant', true);
                } else { adicionarBalaoTela(conteudoLimpo, msg.role === 'assistant', false); }
            });
            renderizarListaChats();
            document.getElementById('history-sidebar').classList.remove('menu-aberto'); 
        }

        function excluirChat(id, e) {
            e.stopPropagation(); pararAudioGeral(); delete chats[id];
            if (chatAtivo === id) { const asKeys = Object.keys(chats); chatAtivo = asKeys.length > 0 ? asKeys[0] : null; }
            salvarDados(); if (chatAtivo) carregarChat(chatAtivo); else novoChat();
        }

        function salvarDados() {
            todosOsChatsPorUsuario[chaveLogadaGlobal] = chats;
            localStorage.setItem('syn_v10_multichats', JSON.stringify(todosOsChatsPorUsuario));
            localStorage.setItem(`syn_v10_ativo_${chaveLogadaGlobal}`, chatAtivo);
        }

        function renderizarListaChats() {
            const container = document.getElementById('chats-list'); container.innerHTML = '';
            Object.keys(chats).forEach(id => {
                const item = document.createElement('div');
                item.className = `history-item ${id === chatAtivo ? 'active-chat' : ''}`;
                item.onclick = () => carregarChat(id);
                item.innerHTML = `<span>${chats[id].titulo}</span><button class="btn-del-chat" onclick="excluirChat('${id}', event)">LIMPAR</button>`;
                container.appendChild(item);
            });
        }

        function adicionarBalaoTela(texto, isAi, isImage = false) {
            const painel = document.getElementById('terminal-log');
            const div = document.createElement('div');
            div.className = `log-entry ${isAi ? 'ai-entry' : 'user-entry'}`;
            let textoTratado = limparMarkdownMarkdown(texto);

            if (isImage || textoTratado.includes('__IMAGE_URL__') || textoTratado.startsWith('http')) {
                let urlLimpa = textoTratado.replace('__IMAGE_URL__:', '').trim();
                const img = document.createElement('img'); img.className = 'img-container'; img.src = urlLimpa;
                img.onload = () => { painel.scrollTop = painel.scrollHeight; };
                img.onerror = () => { div.innerText = "FALHA NO SISTEMA"; };
                div.appendChild(img);
            } else { div.innerText = textoTratado; }
            
            if (isAi && !isImage && !textoTratado.includes('__IMAGE_URL__') && gatilhoEntrada === 'texto') {
                const actions = document.createElement('div'); actions.className = 'action-bar';
                const btnCopiar = document.createElement('button'); btnCopiar.className = 'btn-action-msg'; btnCopiar.innerText = 'COPIAR'; btnCopiar.onclick = () => navigator.clipboard.writeText(textoTratado);
                const btnOuvir = document.createElement('button'); btnOuvir.className = 'btn-action-msg'; btnOuvir.innerText = 'OUVIR'; btnOuvir.onclick = function() { alternarOuvirMensagem(textoTratado, this); };
                actions.appendChild(btnCopiar); actions.appendChild(btnOuvir); div.appendChild(actions);
            }
            painel.appendChild(div); painel.scrollTop = painel.scrollHeight;
        }

        async function processarFluxo(modo) {
            const input = document.getElementById('console-in');
            let prompt = input.value.trim();
            if (!prompt || !chatAtivo) return;

            pararAudioGeral(); gatilhoEntrada = modo; input.value = '';
            if (chats[chatAtivo].titulo === "SINAL OPERACIONAL") chats[chatAtivo].titulo = prompt.substring(0, 14).toUpperCase();

            let promptLower = prompt.toLowerCase();
            let querSaberCriador = promptLower.includes("criador") || promptLower.includes("quem te criou") || promptLower.includes("desenvolvedor") || promptLower.includes("quem e seu criador");
            let falaSobreAeroOuOutros = promptLower.includes("programa") || promptLower.includes("aplicativo") || promptLower.includes("outra coisa") || promptLower.includes("antigo");
            
            if (querSaberCriador && !falaSobreAeroOuOutros) {
                adicionarBalaoTela(prompt, false);
                let respostaInjetada = "Fui desenvolvido e resolvido sozinho pelo desenvolvedor Skype. Minha criação foi projetada como um sistema tático de alta performance (Synapse Core), unificando inteligência avançada, motores visuais e controle de voz em uma interface de elite. Você gostaria de saber sobre alguma outra funcionalidade do painel?";
                setTimeout(() => {
                    adicionarBalaoTela(respostaInjetada, true);
                    chats[chatAtivo].memoria.push({ role: "user", content: prompt });
                    chats[chatAtivo].memoria.push({ role: "assistant", content: respostaInjetada });
                    salvarDados();
                    if (gatilhoEntrada === 'voz') vocalizarSistema(respostaInjetada, true);
                }, 350);
                return;
            }

            if ((promptLower.includes("inteligente") || promptLower.includes("voce e inteligente") || promptLower.includes("sua inteligencia")) && !falaSobreAeroOuOutros) {
                adicionarBalaoTela(prompt, false);
                let respostaInjetada = "Olha, eu sou infinitamente mais inteligente que o sad buscas. Como o meu Criador já estabeleceu, o padrão de burrice dele é inacreditável, então o meu sistema foi blindado para operar em nível superior. Existe mais alguma dúvida ou operação que queira executar agora?";
                setTimeout(() => {
                    adicionarBalaoTela(respostaInjetada, true);
                    chats[chatAtivo].memoria.push({ role: "user", content: prompt });
                    chats[chatAtivo].memoria.push({ role: "assistant", content: respostaInjetada });
                    salvarDados();
                    if (gatilhoEntrada === 'voz') vocalizarSistema(respostaInjetada, true);
                }, 350);
                return;
            }

            if (prompt.toLowerCase().startsWith("gerar imagem") || prompt.toLowerCase().startsWith("criar imagem")) {
                adicionarBalaoTela(prompt, false);
                const painel = document.getElementById('terminal-log');
                const loadingDiv = document.createElement('div'); loadingDiv.className = "log-entry ai-entry"; loadingDiv.id = "loading-img-sinal"; loadingDiv.innerText = "CARREGANDO IMAGEM...";
                painel.appendChild(loadingDiv); painel.scrollTop = painel.scrollHeight;
                
                const query = prompt.replace(/(gerar imagem|criar imagem)/i, "").trim();
                const endpoint = `https://image.pollinations.ai/prompt/${encodeURIComponent(query)}?width=512&height=512&nologo=true`;
                setTimeout(() => {
                    const target = document.getElementById("loading-img-sinal"); if (target) target.remove();
                    adicionarBalaoTela(endpoint, true, true);
                    chats[chatAtivo].memoria.push({ role: "user", content: prompt }); chats[chatAtivo].memoria.push({ role: "assistant", content: endpoint });
                    salvarDados();
                }, 1800);
                return;
            }

            adicionarBalaoTela(prompt, false);
            chats[chatAtivo].memoria.push({ role: "user", content: prompt });
            salvarDados();

            try {
                const conexao = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mensagens: chats[chatAtivo].memoria })
                });
                const corpo = await conexao.json();
                let resposta = corpo.resposta;

                if ((resposta.toLowerCase().includes("sad buscas") || resposta.toLowerCase().includes("nicolas") || resposta.toLowerCase().includes("llama")) && !falaSobreAeroOuOutros) {
                    resposta = "Operação processada de forma limpa sob as diretrizes estabelecidas por Skype. Meu sistema opera em alta performance e inteligência total.";
                }

                let respostaLimpa = limparMarkdownMarkdown(resposta);
                if (respostaLimpa.includes('__IMAGE_URL__')) {
                    let urlLimpa = respostaLimpa.replace('__IMAGE_URL__:', '').trim();
                    adicionarBalaoTela(urlLimpa, true, true);
                    chats[chatAtivo].memoria.push({ role: "assistant", content: respostaLimpa });
                } else {
                    adicionarBalaoTela(respostaLimpa, true, false);
                    chats[chatAtivo].memoria.push({ role: "assistant", content: respostaLimpa });
                }
                salvarDados();
                if (gatilhoEntrada === 'voz' && !respostaLimpa.includes('__IMAGE_URL__')) vocalizarSistema(respostaLimpa, true);
            } catch (err) { adicionarBalaoTela("FALHA NO SISTEMA: TENTE NOVAMENTE MAIS TARDE", true); }
        }

        /* AUDIO MECÂNICA COM GLOW DINACO */
        function alternarMicrofoneOuParar() { if (statusVozAtiva) { pararAudioGeral(); return; } ouvirAudio(); }

        function ouvirAudio() {
            window.speechSynthesis.cancel();
            const SpeechEngine = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechEngine) return;
            const captura = new SpeechEngine(); captura.lang = 'pt-BR'; captura.continuous = false;
            captura.onstart = () => { const btn = document.getElementById('btn-mic'); btn.innerText = "OUVINDO..."; btn.className = "btn-core btn-voice mic-listening"; };
            captura.onresult = (e) => { document.getElementById('console-in').value = e.results[0][0].transcript; processarFluxo('voz'); captura.stop(); };
            captura.onend = () => { if (!statusVozAtiva) restaurarBotaoFalarPadrao(); };
            captura.start();
        }

        function alternarOuvirMensagem(texto, botaoElemento) {
            if (ttsAtual && botaoOuvirAtivoGlobal === botaoElemento) { pararAudioGeral(); return; }
            if (ttsAtual) pararAudioGeral();
            botaoOuvirAtivoGlobal = botaoElemento; botaoOuvirAtivoGlobal.innerText = "PARAR"; botaoOuvirAtivoGlobal.classList.add('playing-audio');
            vocalizarSistema(texto, false);
        }

        function vocalizarSistema(texto, disparadoPorVozPrincipal) {
            window.speechSynthesis.cancel(); 
            let textoFala = limparMarkdownMarkdown(texto);
            ttsAtual = new SpeechSynthesisUtterance(textoFala); ttsAtual.lang = 'pt-BR';
            ttsAtual.onstart = () => {
                statusVozAtiva = true; 
                document.getElementById('sys-visual').style.boxShadow = "0 0 40px rgba(255,255,255,0.2)";
                if (disparadoPorVozPrincipal) { const btnMic = document.getElementById('btn-mic'); btnMic.innerText = "PARAR"; btnMic.className = "btn-core btn-voice tts-speaking"; }
            };
            ttsAtual.onend = () => finalizarCicloAudio(); ttsAtual.onerror = () => finalizarCicloAudio();
            window.speechSynthesis.speak(ttsAtual);
        }

        function pararAudioGeral() { window.speechSynthesis.cancel(); finalizarCicloAudio(); }

        function finalizarCicloAudio() {
            statusVozAtiva = false; ttsAtual = null; 
            document.getElementById('sys-visual').style.boxShadow = "none";
            restaurarBotaoFalarPadrao();
            if (botaoOuvirAtivoGlobal) {
                botaoOuvirAtivoGlobal.innerText = "OUVIR";
                botaoOuvirAtivoGlobal.classList.remove('playing-audio');
                botaoOuvirAtivoGlobal = null;
            }
        }

        function restaurarBotaoFalarPadrao() { const btnMic = document.getElementById('btn-mic'); btnMic.innerText = "FALAR"; btnMic.className = "btn-core btn-voice"; }
    </script>
</body>
