<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SYNAPSE CORE v4.5 | SKYPE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --blue: #0066FF; --bg: #000; --card: #0d0d0d; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'JetBrains Mono', monospace; }
        body { background: var(--bg); color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; position: fixed; width: 100%; }

        /* TELAS DE ENTRADA */
        .overlay-screen { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .btn-main { width: 100%; max-width: 300px; padding: 18px; margin: 10px; background: var(--blue); color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
        .btn-outline { background: transparent; border: 1px solid var(--blue); }
        input.auth-input { width: 100%; max-width: 300px; padding: 15px; background: #111; border: 1px solid #333; color: #fff; text-align: center; border-radius: 8px; margin-bottom: 10px; }

        /* UI PRINCIPAL */
        .top-nav { padding: 15px 20px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; background: #050505; }
        .top-nav h1 { font-size: 0.8rem; letter-spacing: 4px; color: #666; }
        .menu-dots { font-size: 1.5rem; cursor: pointer; color: var(--blue); }

        /* SIDEBAR MENU */
        #side-menu { position: fixed; top: 0; right: -280px; width: 280px; height: 100%; background: #0a0a0a; border-left: 1px solid #222; z-index: 9999; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); padding: 30px 20px; display: flex; flex-direction: column; gap: 15px; }
        #side-menu.active { right: 0; }
        .menu-item { width: 100%; padding: 15px; background: #111; border: 1px solid #222; color: #fff; text-align: left; border-radius: 6px; cursor: pointer; font-size: 0.75rem; }
        .menu-item:hover { border-color: var(--blue); }

        /* DASHBOARD */
        #main-container { display: flex; flex: 1; overflow: hidden; }
        
        /* PC VIEW: CUBO E CORES */
        .pc-sidebar { width: 280px; border-right: 1px solid #222; padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 30px; }
        .cube-box { width: 100px; height: 100px; border: 1px solid var(--blue); animation: spin 8s infinite linear; }
        @keyframes spin { from { transform: rotateX(0) rotateY(0); } to { transform: rotateX(360deg) rotateY(360deg); } }
        .color-group { display: flex; gap: 10px; }
        .dot { width: 20px; height: 20px; border-radius: 50%; cursor: pointer; border: 1px solid #333; }

        /* CHAT WINDOW */
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 15px; border-radius: 12px; max-width: 85%; font-size: 1rem; line-height: 1.5; position: relative; }
        .user-msg { align-self: flex-end; background: #000; border: 1px solid var(--blue); }
        .ai-msg { align-self: flex-start; background: #0d0d0d; border: 1px solid #222; }

        /* CONTROLES */
        .controls { padding: 20px; border-top: 1px solid #222; background: #000; display: flex; flex-direction: column; gap: 10px; }
        .input-row { display: flex; gap: 10px; }
        input#user-input { flex: 1; padding: 15px; background: #111; border: 1px solid #333; color: #fff; border-radius: 8px; outline: none; }
        .btn-action { padding: 15px 25px; background: var(--blue); border: none; color: #fff; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* RESPONSIVIDADE (MODE-MOBILE) */
        body.mode-mobile .pc-sidebar { display: none !important; }
        body.mode-mobile .msg { max-width: 95%; font-size: 1.2rem; }
        body.mode-mobile .controls { padding: 15px; border-top: none; position: sticky; bottom: 0; }
        body.mode-mobile .btn-action { padding: 20px; font-size: 1.1rem; flex: 1; }
    </style>
</head>
<body class="mode-pc">

    <div id="auth-screen" class="overlay-screen">
        <h2 style="letter-spacing: 10px; margin-bottom: 20px;">SYNAPSE CORE</h2>
        <input type="password" id="key-input" class="auth-input" placeholder="ACCESS KEY">
        <button class="btn-main" onclick="validateAuth()">Unlock Terminal</button>
        <p id="auth-error" style="color: red; font-size: 0.7rem; margin-top: 10px; display: none;">SINAL BLOQUEADO: CHAVE INVÁLIDA</p>
    </div>

    <div id="device-screen" class="overlay-screen" style="display: none;">
        <h2 style="margin-bottom: 30px;">DETECTAR HARDWARE</h2>
        <button class="btn-main" onclick="setDevice('pc')">Computador (Full)</button>
        <button class="btn-main btn-outline" onclick="setDevice('mobile')">Celular (Clean)</button>
    </div>

    <div id="side-menu">
        <h3 style="color: var(--blue); font-size: 0.8rem; margin-bottom: 20px;">> MENU_OPTIONS</h3>
        <button class="menu-item" onclick="setDevice('pc')"><i class="fa-solid fa-desktop"></i> Modo Computador</button>
        <button class="menu-item" onclick="setDevice('mobile')"><i class="fa-solid fa-mobile-screen"></i> Modo Celular</button>
        <button class="menu-item" onclick="window.location.reload()"><i class="fa-solid fa-rotate"></i> Resetar Terminal</button>
        <button class="menu-item" style="margin-top: auto; color: red;" onclick="logout()"><i class="fa-solid fa-power-off"></i> SAIR DO SISTEMA</button>
    </div>

    <div class="top-nav">
        <h1>SYNAPSE CORE v4.5</h1>
        <div class="menu-dots" onclick="toggleMenu()">⋮</div>
    </div>

    <div id="main-container">
        <div class="pc-sidebar">
            <div class="cube-box"></div>
            <div class="color-group">
                <div class="dot" style="background:#0066FF" onclick="changeTheme('#0066FF')"></div>
                <div class="dot" style="background:#10b981" onclick="changeTheme('#10b981')"></div>
                <div class="dot" style="background:#ef4444" onclick="changeTheme('#ef4444')"></div>
            </div>
        </div>
        <div id="chat-window"></div>
    </div>

    <div class="controls">
        <div class="input-row">
            <input type="text" id="user-input" placeholder="Aguardando instrução..." onkeydown="if(event.key==='Enter') send()">
            <button class="btn-action" onclick="send()">ENVIAR</button>
        </div>
        <button class="btn-action btn-outline" id="mic-btn" onclick="toggleMic()">ATIVAR MICROFONE</button>
    </div>

    <script>
        let isSpeaking = false;
        let recognition;
        let history = [];

        function validateAuth() {
            const key = document.getElementById('key-input').value.trim().toUpperCase();
            const allowed = ["CORE-SKYPE-2026", "BETA-USER-01", "BETA-USER-02", "BETA-USER-03"];
            if(allowed.includes(key)) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('device-screen').style.display = 'flex';
            } else {
                document.getElementById('auth-error').style.display = 'block';
            }
        }

        function setDevice(mode) {
            document.body.className = mode === 'pc' ? 'mode-pc' : 'mode-mobile';
            document.getElementById('device-screen').style.display = 'none';
            document.getElementById('side-menu').classList.remove('active');
            addBubble("Terminal Synapse sincronizado. Como posso ajudar?", true);
        }

        function toggleMenu() { document.getElementById('side-menu').classList.toggle('active'); }
        function logout() { sessionStorage.clear(); window.location.reload(); }
        function changeTheme(color) { document.documentElement.style.setProperty('--blue', color); }

        function addBubble(text, isAi) {
            const win = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = `msg ${isAi ? 'ai-msg' : 'user-msg'}`;
            div.innerText = text;
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
            if(isAi) speak(text);
        }

        async function send() {
            const input = document.getElementById('user-input');
            const val = input.value.trim();
            if(!val) return;
            addBubble(val, false);
            input.value = "";
            history.push({role: "user", content: val});

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ mensagens: history })
                });
                const data = await res.json();
                addBubble(data.resposta, true);
                history.push({role: "assistant", content: data.resposta});
            } catch(e) { addBubble("ERRO DE SINAL: VERIFIQUE O RENDER.", true); }
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const ut = new SpeechSynthesisUtterance(text);
            ut.lang = 'pt-BR';
            ut.onstart = () => { isSpeaking = true; };
            ut.onend = () => { isSpeaking = false; };
            window.speechSynthesis.speak(ut);
        }

        function toggleMic() {
            if(isSpeaking) return;
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new Speech();
            recognition.lang = 'pt-BR';
            recognition.onstart = () => { document.getElementById('mic-btn').innerText = "OUVINDO..."; };
            recognition.onresult = (e) => {
                const txt = e.results[0][0].transcript;
                document.getElementById('user-input').value = txt;
                send();
            };
            recognition.onend = () => { document.getElementById('mic-btn').innerText = "ATIVAR MICROFONE"; };
            recognition.start();
        }
    </script>
</body>
</html>
