<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SYNAPSE_CORE_SUPREMO</title>
    <style>
        :root { --blue: #0066FF; --bg: #000; }
        * { box-sizing: border-box; font-family: 'JetBrains Mono', monospace; }
        body { margin: 0; background: var(--bg); color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* DETECÇÃO AUTOMÁTICA (O sistema decide) */
        .desktop-only { display: flex !important; }
        @media (max-width: 800px) {
            .desktop-only { display: none !important; }
            .mobile-only { display: flex !important; }
        }

        /* HEADER E CUBO */
        .header { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #333; }
        .cube-tiny { width: 40px; height: 40px; border: 1px solid var(--blue); flex-shrink: 0; }
        
        /* CHAT E CONTROLES */
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; }
        .controls { padding: 15px; border-top: 1px solid #333; display: flex; gap: 10px; }
        input { flex: 1; padding: 15px; background: #111; border: 1px solid #333; color: #fff; }
        button { padding: 15px; background: var(--blue); border: none; color: #fff; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <div class="cube-tiny desktop-only"></div>
        <span style="margin-left: 15px;">SYNAPSE_CORE_v4.5</span>
        <div style="margin-left: auto;" onclick="sair()">⋮ SAIR</div>
    </div>

    <div id="chat-window"></div>

    <div class="controls">
        <input type="text" id="user-input" placeholder="Comando...">
        <button onclick="enviar()">ENVIAR</button>
        <button onclick="falar()">FALAR</button>
    </div>

    <script>
        // Detector de tela em tempo real
        function ajustarInterface() {
            const largura = window.innerWidth;
            if (largura < 800) {
                document.body.classList.add('mobile-mode');
            } else {
                document.body.classList.remove('mobile-mode');
            }
        }
        window.addEventListener('resize', ajustarInterface);
        ajustarInterface();

        function sair() {
            sessionStorage.clear();
            window.location.reload();
        }

        async function enviar() {
            // Lógica de envio padrão...
        }
    </script>
</body>
</html>
