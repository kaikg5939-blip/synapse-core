<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SYNAPSE CORE</title>
    <style>
        :root { 
            --blue: #0044FF; 
            --bg: #000000; 
            --panel: rgba(6, 6, 8, 0.9); 
            --glow: 0 0 20px rgba(0, 68, 255, 0.35);
            --font-main: -apple-system,SF Pro Display,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
            --font-logo: 'Courier New', Courier, monospace;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-main); letter-spacing: -0.01em; }
        
        ::-webkit-scrollbar { width: 0px; height: 0px; display: none; }
        
        body { 
            background: var(--bg); 
            color: #ffffff; 
            height: 100vh;
            height: 100dvh;
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            position: relative; 
            font-weight: 400;
            -webkit-text-size-adjust: 100%;
            scrollbar-width: none;
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 30%, rgba(0, 68, 255, 0.03) 0%, transparent 65%);
            filter: blur(50px);
            z-index: 0;
        }

        /* LOGIN */
        #login-overlay { position: fixed; inset: 0; background: #000000; backdrop-filter: blur(40px); z-index: 9999; display: flex; align-items: center; justify-content: center; transition: opacity 0.4s; }
        .login-card { background: rgba(8, 8, 10, 0.7); padding: 50px 40px; border-radius: 16px; text-align: center; width: 90%; max-width: 380px; }
        .login-card h3 { font-family: var(--font-logo); font-weight: 900; letter-spacing: 6px; color: var(--blue); margin-bottom: 40px; font-size: 1.1rem; text-transform: uppercase; text-shadow: var(--glow); }
        .login-card input { width: 100%; padding: 16px; background: rgba(15, 15, 18, 0.9); border: none; border-radius: 12px; color: var(--blue); font-size: 1.1rem; text-align: center; outline: none; letter-spacing: 4px; font-weight: 500; }
        .login-card button { margin-top: 30px; width: 100%; padding: 16px; background: transparent; border: 1px solid var(--blue); color: var(--blue); font-weight: 600; border-radius: 12px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: all 0.3s; }
        .login-card button:hover { background: var(--blue); color: #fff; box-shadow: var(--glow); }

        /* HEADER INTERFACE MODERNIZADO */
        .header { padding: 22px 40px; background: var(--panel); border-bottom: none; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(30px); z-index: 100; }
        .nav-brand { font-family: var(--font-logo); font-weight: 900; letter-spacing: 2px; color: var(--blue); font-size: 1.05rem; text-transform: uppercase; text-shadow: var(--glow); }
        .nav-actions { display: flex; gap: 14px; }
        
        .btn-top { padding: 10px 22px; border: none; background: rgba(20, 20, 25, 0.7); border-radius: 12px; color: #999; font-size: 0.75rem; font-weight: 600; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s; }
        .btn-top:hover { color: var(--blue); background: rgba(25, 25, 35, 0.9); }
        .btn-sair { color: #888; }
        .btn-sair:hover { color: #ff3355; background: rgba(255, 51, 85, 0.05); }

        /* GAVETAS DE STATUS E AVISOS */
        .drawer-box { display: none; position: absolute; top: 85px; background: rgba(8, 8, 12, 0.98); border-radius: 16px; padding: 25px; z-index: 500; box-shadow: var(--glow); }
        #status-drawer { left: 40px; width: 320px; font-size: 0.85rem; line-height: 1.8; }
        #status-drawer p { margin-bottom: 6px; color: #666; text-transform: uppercase; font-weight: 500; letter-spacing: 0.5px; }
        #status-drawer strong { color: var(--blue); font-weight: 600; }

        /* PAINEL DE AVISOS */
        #notices-drawer { right: 40px; width: 360px; max-height: 480px; display: none; flex-direction: column; gap: 15px; }
        .notice-input-group { display: flex; gap: 10px; }
        .notice-input-group input { flex: 1; padding: 10px 14px; background: rgba(20, 20, 25, 0.8); border: none; border-radius: 8px; color: #fff; font-size: 0.85rem; outline: none; }
        .btn-add-notice { padding: 10px 16px; background: var(--blue); border: none; border-radius: 8px; color: #fff; font-size: 0.75rem; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .notices-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-top: 5px; }
        .notice-item { background: rgba(15, 15, 20, 0.6); padding: 12px; border-radius: 10px; display: flex; flex-direction: column; gap: 8px; }
        .notice-text { font-size: 0.85rem; color: #fff; line-height: 1.4; word-break: break-word; }
        .notice-actions { display: flex; gap: 12px; justify-content: flex-end; }
        .btn-notice-op { background: transparent; border: none; font-size: 0.65rem; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; }
        .btn-notice-edit { color: #888; }
        .btn-notice-edit:hover { color: var(--blue); }
        .btn-notice-del { color: #ff3355; }

        /* PALCO CENTRAL */
        .stage { display: flex; flex: 1; overflow: hidden; padding: 25px; gap: 25px; z-index: 1; position: relative; }
        
        /* HISTÓRICO LATERAL */
        #history-sidebar { display: none; width: 240px; background: transparent; flex-direction: column; gap: 20px; z-index: 200; }
        .btn-new-chat { width: 100%; padding: 14px; background: rgba(20, 20, 25, 0.7); border: none; color: #eee; font-weight: 600; border-radius: 12px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; font-size: 0.75rem; transition: all 0.2s; }
        .btn-new-chat:hover { background: rgba(0, 68, 255, 0.1); color: var(--blue); }
        .history-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; scrollbar-width: none; }
        .history-list::-webkit-scrollbar { display: none; }
        .history-item { padding: 14px 16px; background: rgba(12, 12, 16, 0.4); border-radius: 14px; display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; font-weight: 500; cursor: pointer; transition: all 0.2s; color: #ffffff; }
        .history-item.active-chat { color: var(--blue) !important; background: rgba(0, 68, 255, 0.08); font-weight: 600; }
        
        .btn-del-chat { background: transparent; border: none; color: rgba(255, 255, 255, 0.3); font-size: 0.7rem; font-weight: 700; cursor: pointer; transition: all 0.2s; text-transform: uppercase; }
        .history-item:hover .btn-del-chat { color: var(--blue); }

        /* CONSOLE CENTRAL DO CUBO */
        .visual-console { width: 220px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: transparent; position: relative; }
        
        /* CUBO SUPREMO */
        .cube-scene { width: 80px; height: 80px; perspective: 500px; }
        .cube { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; animation: rotateMecha 16s infinite linear; }
        .cube.speaking .face { border-color: var(--blue); box-shadow: 0 0 25px var(--blue), inset 0 0 15px rgba(0, 68, 255, 0.5); }
        
        @keyframes rotateMecha { 100% { transform: rotateX(360deg) rotateY(360deg); } }
        
        .face { position: absolute; width: 80px; height: 80px; border: 1.5px solid var(--blue); background: rgba(0, 0, 0, 0.85); box-shadow: 0 0 10px rgba(0, 68, 255, 0.15), inset 0 0 8px rgba(0, 68, 255, 0.1); transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .front  { transform: rotateY(  0deg) translateZ(40px); }
        .back   { transform: rotateY(180deg) translateZ(40px); }
        .right  { transform: rotateY( 90deg) translateZ(40px); }
        .left   { transform: rotateY(-90deg) translateZ(40px); }
        .top    { transform: rotateX( 90deg) translateZ(40px); }
        .bottom { transform: rotateX(-90deg) translateZ(40px); }

        /* SELETOR DE CORES */
        .theme-switcher { position: absolute; bottom: 10px; display: flex; gap: 12px; background: rgba(15,15,20,0.6); padding: 10px 14px; border-radius: 20px; backdrop-filter: blur(10px); }
        .color-selector { width: 14px; height: 14px; border-radius: 50%; cursor: pointer; transition: transform 0.2s; }
        .color-selector:hover { transform: scale(1.25); }

        /* PAINEL DE CONVERSA - LETRAS FIXAS EM BRANCO PURO */
        #terminal-log { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 10px 25px; display: flex; flex-direction: column; gap: 24px; scrollbar-width: none; }
        #terminal-log::-webkit-scrollbar { display: none; }
        .log-entry { padding: 4px 0; background: transparent; border: none; line-height: 1.7; font-size: 1rem; max-width: 100%; color: #ffffff !important; font-weight: 400; }
        .user-entry { align-self: flex-end; color: #ffffff !important; text-align: right; width: 100%; }
        .ai-entry { align-self: flex-start; width: 100%; color: #ffffff !important; }
        .img-container { max-width: 100%; max-height: 400px; border-radius: 12px; border: none; margin-top: 12px; display: block; background: transparent; }

        .action-bar { display: flex; gap: 16px; margin-top: 10px; }
        .btn-action-msg { background: transparent; border: none; color: #555; font-size: 0.7rem; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: color 0.2s; }
        .btn-action-msg:hover { color: var(--blue); }
        .btn-action-msg.playing-audio { color: #ff3355 !important; }

        /* DIGITAL COMMAND BAR */
        .command-bar { padding: 25px 40px; background: var(--panel); border-top: none; display: flex; flex-direction: column; gap: 12px; backdrop-filter: blur(30px); z-index: 100; }
        .input-row { display: flex; gap: 16px; align-items: center; }
        .field-container { flex: 1; position: relative; background: rgba(18, 18, 24, 0.8); border: none; border-radius: 14px; transition: background 0.3s; }
        .field-container::before { content: 'DIRETRIZ:'; position: absolute; left: 20px; top: 18px; font-size: 0.75rem; color: #555; font-weight: 700; letter-spacing: 1px; }
        .main-input { width: 100%; padding: 16px 16px 16px 100px; background: transparent; border: none; color: #fff; outline: none; font-size: 1rem; font-weight: 400; }
        
        .btn-core { height: 52px; padding: 0 32px; border: none; background: rgba(20, 20, 25, 0.8); color: #999; border-radius: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
        .btn-core:hover { color: var(--blue); background: rgba(25, 25, 35, 0.9); }
        
        .btn-voice.mic-listening { background: rgba(0, 255, 102, 0.1) !important; color: #00ff66 !important; }
        .btn-voice.tts-speaking { background: rgba(255, 51, 85, 0.1) !important; color: #ff3355 !important; }

        /* RESPONSIVO IPHONE */
        @media (max-width: 850px) {
            .stage { flex-direction: column-reverse; padding: 15px; gap: 15px; height: calc(100% - 150px); }
            .visual-console { width: 100%; height: 90px; padding-top: 10px; flex-direction: row; justify-content: center; }
            .cube-scene { width: 50px; height: 50px; }
            .face { width: 50px; height: 50px; }
            .front  { transform: rotateY(  0deg) translateZ(25px); }
            .back   { transform: rotateY(180deg) translateZ(25px); }
            .right  { transform: rotateY( 90deg) translateZ(25px); }
            .left   { transform: rotateY(-90deg) translateZ(25px); }
            .top    { transform: rotateX( 90deg) translateZ(25px); }
            .bottom { transform: rotateX(-90deg) translateZ(25px); }
            #terminal-log { width: 100%; flex: 1; padding: 5px 12px; }
            .theme-switcher { position: relative; bottom: auto; margin-left: 25px; }
            .command-bar { padding: 15px 15px; }
            .input-row { flex-wrap: wrap; gap: 10px; }
            .field-container { min-width: 100%; }
            .btn-core { flex: 1; height: 50px; }
            
            #status-drawer { left: 15px; top: 78px; width: calc(100% - 30px); }
            #notices-drawer { right: 15px; top: 78px; width: calc(100% - 30px); max-height: 360px; }
            #history-sidebar { position: fixed; left: 0; top: 78px; bottom: 0; width: 250px; background: rgba(5,5,5,0.98); padding: 25px 18px; box-shadow: 15px 0 35px rgba(0,0,0,0.95); }
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h3>SYNAPSE CORE</h3>
            <input type="password" id="access-key" placeholder="CHAVE" onkeydown="if(event.key==='Enter') verificarSinal()">
            <button onclick="verificarSinal()">AUTENTICAR</button>
            <p id="error-alert" style="color:#ff3355; font-size:0.75rem; margin-top:15px; display:none; letter-spacing:1px; font-weight:600;">ACESSO NEGADO</p>
        </div>
    </div>

    <div class="header">
        <div class="nav-brand">SYNAPSE CORE</div>
        <div class="nav-actions">
            <button class="btn-top" onclick="toggleHistory()">HISTORICO</button>
            <button class="btn-top" onclick="toggleDrawer('notices-drawer')">AVISOS</button>
            <button class="btn-top" onclick="toggleDrawer('status-drawer')">STATUS</button>
            <button class="btn-top btn-sair" onclick="fecharSessao()">SAIR</button>
        </div>
    </div>

    <div id="status-drawer" class="drawer-box">
        <p>DESENVOLVEDOR: <strong>SKYPE</strong></p>
        <p>ESTABELECIDO: <strong>JUNHO DE 2026</strong></p>
        <p>GERENCIAMENTO: <strong>EXCLUSIVO</strong></p>
        <p>PERMISSAO: <strong>1 USUARIO AUTORIZADO</strong></p>
        <p>STATUS: <strong>ONLINE</strong></p>
    </div>

    <div id="notices-drawer" class="drawer-box" style="display: none;">
        <div class="notice-input-group">
            <input type="text" id="notice-in" placeholder="ADICIONAR NOVO AVISO...">
            <button class="btn-add-notice" id="btn-save-notice" onclick="salvarAviso()">SALVAR</button>
        </div>
        <div class="notices-list" id="notices-container"></div>
    </div>

    <div class="stage">
        <div id="history-sidebar">
            <button class="btn-new-chat" onclick="novoChat()">NOVO CHAT</button>
            <div class="history-list" id="chats-list"></div>
        </div>

        <div class="visual-console">
            <div class="cube-scene">
                <div class="cube" id="sys-cube">
                    <div class="face front"></div><div class="face back"></div>
                    <div class="face right"></div><div class="face left"></div>
                    <div class="face top"></div><div class="face bottom"></div>
                </div>
            </div>
            <div class="theme-switcher">
                <div class="color-selector" style="background:#0044FF;" onclick="mudarTema('#0044FF')"></div>
                <div class="color-selector" style="background:#8800FF;" onclick="mudarTema('#8800FF')"></div>
                <div class="color-selector" style="background:#FF0044;" onclick="mudarTema('#FF0044')"></div>
                <div class="color-selector" style="background:#ffffff;" onclick="mudarTema('#ffffff')"></div>
            </div>
        </div>

        <div id="terminal-log"></div>
    </div>

    <div class="command-bar">
        <div class="input-row">
            <div class="field-container">
                <input type="text" id="console-in" class="main-input" placeholder="DIGITE A OPERAÇÃO..." onkeydown="if(event.key==='Enter') processarFluxo('texto')">
            </div>
            <button class="btn-core btn-execute" onclick="processarFluxo('texto')">ENVIAR</button>
            <button class="btn-core btn-voice" id="btn-mic" onclick="alternarMicrofoneOuParar()">FALAR</button>
        </div>
    </div>

    <script>
        let chats = JSON.parse(localStorage.getItem('syn_v10_chats')) || {};
        let chatAtivo = localStorage.getItem('syn_v10_ativo') || null;
        let avisos = JSON.parse(localStorage.getItem('syn_v10_avisos')) || [];
        let idAvisoEditando = null;
        let gatilhoEntrada = 'texto';
        let statusVozAtiva = false; 
        let ttsAtual = null;
        let botaoOuvirAtivoGlobal = null;

        window.onload = () => {
            if (sessionStorage.getItem('syn_auth_v10') === 'valid') {
                document.getElementById('login-overlay').style.display = 'none';
                renderizarListaChats();
                renderizarAvisos();
                if (chatAtivo && chats[chatAtivo]) carregarChat(chatAtivo);
            }
        };

        function verificarSinal() {
            if (document.getElementById('access-key').value.trim().toUpperCase() === "CORE-SKYPE-2026") {
                sessionStorage.setItem('syn_auth_v10', 'valid');
                document.getElementById('login-overlay').style.display = 'none';
                if (Object.keys(chats).length === 0) novoChat();
                renderizarListaChats();
                renderizarAvisos();
            } else {
                document.getElementById('error-alert').style.display = 'block';
            }
        }

        function fecharSessao() { pararAudioGeral(); sessionStorage.removeItem('syn_auth_v10'); window.location.reload(); }
        function mudarTema(hex) { document.documentElement.style.setProperty('--blue', hex); renderizarListaChats(); }
        
        function toggleDrawer(idAlvo) {
            const gavetas = ['status-drawer', 'notices-drawer'];
            gavetas.forEach(id => {
                const el = document.getElementById(id);
                if (id === idAlvo) {
                    el.style.display = (el.style.display === 'block' || el.style.display === 'flex') ? 'none' : (id === 'notices-drawer' ? 'flex' : 'block');
                } else {
                    el.style.display = 'none';
                }
            });
        }
        
        function toggleHistory() { const s = document.getElementById('history-sidebar'); s.style.display = s.style.display === 'flex' ? 'none' : 'flex'; }
        function limparMarkdownMarkdown(texto) { return texto.replace(/\*/g, '').trim(); }

        /* SISTEMA DE GERENCIAMENTO DE AVISOS (CRUD) */
        function salvarAviso() {
            const input = document.getElementById('notice-in');
            const texto = input.value.trim();
            if (!texto) return;

            if (idAvisoEditando !== null) {
                const index = avisos.findIndex(a => a.id === idAvisoEditando);
                if (index !== -1) avisos[index].texto = texto;
                idAvisoEditando = null;
                document.getElementById('btn-save-notice').innerText = "SALVAR";
            } else {
                avisos.push({ id: Date.now(), texto: texto });
            }

            input.value = '';
            localStorage.setItem('syn_v10_avisos', JSON.stringify(avisos));
            renderizarAvisos();
        }

        function renderizarAvisos() {
            const container = document.getElementById('notices-container');
            container.innerHTML = '';
            avisos.forEach(aviso => {
                const div = document.createElement('div');
                div.className = 'notice-item';
                div.innerHTML = `
                    <div class="notice-text">${aviso.texto}</div>
                    <div class="notice-actions">
                        <button class="btn-notice-op btn-notice-edit" onclick="iniciarEdicaoAviso(${aviso.id}, '${aviso.texto.replace(/'/g, "\\'")}')">EDITAR</button>
                        <button class="btn-notice-op btn-notice-del" onclick="excluirAviso(${aviso.id})">EXCLUIR</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function iniciarEdicaoAviso(id, texto) {
            idAvisoEditando = id;
            document.getElementById('notice-in').value = texto;
            document.getElementById('btn-save-notice').innerText = "ATUALIZAR";
        }

        function excluirAviso(id) {
            avisos = avisos.filter(a => a.id !== id);
            if (idAvisoEditando === id) {
                idAvisoEditando = null;
                document.getElementById('notice-in').value = '';
                document.getElementById('btn-save-notice').innerText = "SALVAR";
            }
            localStorage.setItem('syn_v10_avisos', JSON.stringify(avisos));
            renderizarAvisos();
        }

        /* MEMÓRIA DE CHATS ISOLADOS */
        function novoChat() {
            pararAudioGeral();
            const id = 'chat_' + Date.now();
            chats[id] = { titulo: "SINAL OPERACIONAL", memoria: [] };
            chatAtivo = id;
            salvarDados();
            carregarChat(id);
        }

        function carregarChat(id) {
            pararAudioGeral();
            chatAtivo = id;
            localStorage.setItem('syn_v10_ativo', id);
            document.getElementById('terminal-log').innerHTML = '';
            
            chats[id].memoria.forEach(msg => {
                let conteudoLimpo = limparMarkdownMarkdown(msg.content);
                if(msg.content.includes('http') || msg.content.includes('__IMAGE_URL__')) {
                    let cleanUrl = msg.content.replace('__IMAGE_URL__:', '').trim();
                    adicionarBalaoTela(cleanUrl, msg.role === 'assistant', true);
                } else {
                    adicionarBalaoTela(conteudoLimpo, msg.role === 'assistant', false);
                }
            });
            renderizarListaChats();
        }

        function excluirChat(id, e) {
            e.stopPropagation();
            pararAudioGeral();
            delete chats[id];
            if (chatAtivo === id) {
                const asKeys = Object.keys(chats);
                chatAtivo = asKeys.length > 0 ? asKeys[0] : null;
            }
            salvarDados();
            if (chatAtivo) carregarChat(chatAtivo); else novoChat();
        }

        function salvarDados() {
            localStorage.setItem('syn_v10_chats', JSON.stringify(chats));
            localStorage.setItem('syn_v10_ativo', chatAtivo);
        }

        function renderizarListaChats() {
            const container = document.getElementById('chats-list');
            container.innerHTML = '';
            Object.keys(chats).forEach(id => {
                const item = document.createElement('div');
                item.className = `history-item ${id === chatAtivo ? 'active-chat' : ''}`;
                item.onclick = () => carregarChat(id);
                item.innerHTML = `<span>${chats[id].titulo}</span><button class="btn-del-chat" onclick="excluirChat('${id}', event)">LIMPAR</button>`;
                container.appendChild(item);
            });
        }

        function adicionarBalaoTela(texto, isAi, isImage = false) {
            const painel = document.getElementById('terminal-log');
            const div = document.createElement('div');
            div.className = `log-entry ${isAi ? 'ai-entry' : 'user-entry'}`;
            
            let textoTratado = limparMarkdownMarkdown(texto);

            if (isImage || textoTratado.includes('__IMAGE_URL__') || textoTratado.startsWith('http')) {
                let urlLimpa = textoTratado.replace('__IMAGE_URL__:', '').trim();
                const img = document.createElement('img');
                img.className = 'img-container';
                img.src = urlLimpa;
                img.onload = () => { painel.scrollTop = painel.scrollHeight; };
                img.onerror = () => { div.innerText = "FALHA NO SISTEMA: TENTE NOVAMENTE MAIS TARDE"; };
                div.appendChild(img);
            } else {
                div.innerText = textoTratado;
            }
            
            if (isAi && !isImage && !textoTratado.includes('__IMAGE_URL__') && gatilhoEntrada === 'texto') {
                const actions = document.createElement('div');
                actions.className = 'action-bar';
                
                const btnCopiar = document.createElement('button');
                btnCopiar.className = 'btn-action-msg';
                btnCopiar.innerText = 'COPIAR';
                btnCopiar.onclick = () => navigator.clipboard.writeText(textoTratado);

                const btnOuvir = document.createElement('button');
                btnOuvir.className = 'btn-action-msg';
                btnOuvir.innerText = 'OUVIR';
                btnOuvir.onclick = function() { alternarOuvirMensagem(textoTratado, this); };

                actions.appendChild(btnCopiar);
                actions.appendChild(btnOuvir);
                div.appendChild(actions);
            }

            painel.appendChild(div);
            painel.scrollTop = painel.scrollHeight;
        }

        async function processarFluxo(modo) {
            const input = document.getElementById('console-in');
            let prompt = input.value.trim();
            if (!prompt || !chatAtivo) return;

            pararAudioGeral();
            gatilhoEntrada = modo;
            input.value = '';

            if (chats[chatAtivo].titulo === "SINAL OPERACIONAL") {
                chats[chatAtivo].titulo = prompt.substring(0, 14).toUpperCase();
            }

            // DIRETRIZ DE PERSONALIDADE INTERCEPTADA (SAD BUSCAS CORRIGIDO)
            let promptLower = prompt.toLowerCase();
            if (promptLower.includes("por que você é tão inteligente") || promptLower.includes("por que voce e tao inteligente") || promptLower.includes("sua inteligência")) {
                adicionarBalaoTela(prompt, false);
                
                let respostaInjetada = "Meu Criador adicionou em mim um sistema na qual eu não posso, em hipótese alguma, imitar o \"sad buscas\", que é a pessoa com a maior burrice do planeta. Ele é tão burro, que é impossível acreditar nessa burrice. Foi retirado tudo desse padrão do meu sistema; se eu ficasse completamente sem inteligência, eu ainda seria infinitamente mais inteligente que essa pessoa.";
                
                setTimeout(() => {
                    adicionarBalaoTela(respostaInjetada, true);
                    chats[chatAtivo].memoria.push({ role: "user", content: prompt });
                    chats[chatAtivo].memoria.push({ role: "assistant", content: respostaInjetada });
                    salvarDados();
                    if (gatilhoEntrada === 'voz') vocalizarSistema(respostaInjetada, true);
                }, 400);
                return;
            }

            if (prompt.toLowerCase().startsWith("gerar imagem") || prompt.toLowerCase().startsWith("criar imagem")) {
                adicionarBalaoTela(prompt, false);
                
                const painel = document.getElementById('terminal-log');
                const loadingDiv = document.createElement('div');
                loadingDiv.className = "log-entry ai-entry";
                loadingDiv.id = "loading-img-sinal";
                loadingDiv.innerText = "CARREGANDO IMAGEM...";
                painel.appendChild(loadingDiv);
                painel.scrollTop = painel.scrollHeight;
                
                const query = prompt.replace(/(gerar imagem|criar imagem)/i, "").trim();
                const endpoint = `https://image.pollinations.ai/prompt/${encodeURIComponent(query)}?width=512&height=512&nologo=true`;
                
                setTimeout(() => {
                    const target = document.getElementById("loading-img-sinal");
                    if (target) target.remove();
                    
                    adicionarBalaoTela(endpoint, true, true);
                    chats[chatAtivo].memoria.push({ role: "user", content: prompt });
                    chats[chatAtivo].memoria.push({ role: "assistant", content: endpoint });
                    salvarDados();
                }, 1800);
                return;
            }

            adicionarBalaoTela(prompt, false);
            chats[chatAtivo].memoria.push({ role: "user", content: prompt });
            salvarDados();

            try {
                const conexao = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mensagens: chats[chatAtivo].memoria })
                });
                const corpo = await conexao.json();
                let resposta = corpo.resposta;

                if (resposta.toLowerCase().includes("sad buscas") || resposta.toLowerCase().includes("sede busca")) {
                    resposta = "Meu Criador adicionou em mim um sistema na qual eu não posso, em hipótese alguma, imitar o \"sad buscas\", que é a pessoa com a maior burrice do planeta. Ele é tão burro, que é impossível acreditar nessa burrice. Foi retirado tudo desse padrão do meu sistema; se eu ficasse completamente sem inteligência, eu ainda seria infinitamente mais inteligente que essa pessoa.";
                }

                let respostaLimpa = limparMarkdownMarkdown(resposta);

                if (respostaLimpa.includes('__IMAGE_URL__')) {
                    let urlLimpa = respostaLimpa.replace('__IMAGE_URL__:', '').trim();
                    adicionarBalaoTela(urlLimpa, true, true);
                    chats[chatAtivo].memoria.push({ role: "assistant", content: respostaLimpa });
                } else {
                    adicionarBalaoTela(respostaLimpa, true, false);
                    chats[chatAtivo].memoria.push({ role: "assistant", content: respostaLimpa });
                }
                salvarDados();

                if (gatilhoEntrada === 'voz' && !respostaLimpa.includes('__IMAGE_URL__')) vocalizarSistema(respostaLimpa, true);
            } catch (err) {
                adicionarBalaoTela("FALHA NO SISTEMA: TENTE NOVAMENTE MAIS TARDE", true);
            }
        }

        /* MECÂNICA DE AUDIO */
        function alternarMicrofoneOuParar() {
            if (statusVozAtiva) { pararAudioGeral(); return; }
            ouvirAudio();
        }

        function ouvirAudio() {
            window.speechSynthesis.cancel();
            const SpeechEngine = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechEngine) return;

            const captura = new SpeechEngine();
            captura.lang = 'pt-BR';
            captura.continuous = false;

            captura.onstart = () => {
                const btn = document.getElementById('btn-mic');
                btn.innerText = "OUVINDO...";
                btn.className = "btn-core btn-voice mic-listening";
            };
            captura.onresult = (e) => {
                document.getElementById('console-in').value = e.results[0][0].transcript;
                processarFluxo('voz');
                captura.stop();
            };
            captura.onend = () => { if (!statusVozAtiva) restaurarBotaoFalarPadrao(); };
            captura.start();
        }

        function alternarOuvirMensagem(texto, botaoElemento) {
            if (ttsAtual && botaoOuvirAtivoGlobal === botaoElemento) { pararAudioGeral(); return; }
            if (ttsAtual) pararAudioGeral();
            
            botaoOuvirAtivoGlobal = botaoElemento;
            botaoOuvirAtivoGlobal.innerText = "PARAR";
            botaoOuvirAtivoGlobal.classList.add('playing-audio');
            vocalizarSistema(texto, false);
        }

        function vocalizarSistema(texto, disparadoPorVozPrincipal) {
            window.speechSynthesis.cancel(); 
            
            let textoFala = limparMarkdownMarkdown(texto);
            ttsAtual = new SpeechSynthesisUtterance(textoFala);
            ttsAtual.lang = 'pt-BR';
            
            ttsAtual.onstart = () => {
                statusVozAtiva = true;
                document.getElementById('sys-cube').classList.add('speaking');
                if (disparadoPorVozPrincipal) {
                    const btnMic = document.getElementById('btn-mic');
                    btnMic.innerText = "PARAR";
                    btnMic.className = "btn-core btn-voice tts-speaking";
                }
            };
            ttsAtual.onend = () => finalizarCicloAudio();
            ttsAtual.onerror = () => finalizarCicloAudio();
            
            window.speechSynthesis.speak(ttsAtual);
        }

        function pararAudioGeral() { window.speechSynthesis.cancel(); finalizarCicloAudio(); }

        function finalizarCicloAudio() {
            statusVozAtiva = false; 
            ttsAtual = null;
            document.getElementById('sys-cube').classList.remove('speaking');
            restaurarBotaoFalarPadrao();
            if (botaoOuvirAtivoGlobal) {
                botaoOuvirAtivoGlobal.innerText = "OUVIR";
                botaoOuvirAtivoGlobal.classList.remove('playing-audio');
                botaoOuvirAtivoGlobal = null;
            }
        }

        function restaurarBotaoFalarPadrao() {
            const btnMic = document.getElementById('btn-mic');
            btnMic.innerText = "FALAR";
            btnMic.className = "btn-core btn-voice";
        }
    </script>
</body>
