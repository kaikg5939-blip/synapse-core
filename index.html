<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYNAPSE_CORE_FINAL</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: monospace; height: 100vh; display: flex; flex-direction: column; }
        
        /* TELA DE LOGIN */
        #auth-overlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        input { padding: 15px; background: #111; color: #fff; border: 1px solid #333; margin-bottom: 10px; width: 250px; text-align: center; }
        button { padding: 15px 30px; background: #0066FF; border: none; color: #fff; cursor: pointer; }

        /* HEADER */
        .header { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #333; }
        
        /* CHAT */
        #chat { flex: 1; overflow-y: auto; padding: 20px; }
        .msg { margin: 10px 0; padding: 10px; border: 1px solid #333; }
        
        /* CONTROLES */
        .bar { display: flex; gap: 10px; padding: 10px; border-top: 1px solid #333; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <input type="password" id="key" placeholder="DIGITE A CHAVE">
        <button onclick="login()">ACESSAR</button>
    </div>

    <div class="header">
        <span>SYNAPSE_CORE</span>
        <span onclick="alert('SAIR DO LOGIN: Atualize a página e não digite a chave.')" style="cursor:pointer">⋮</span>
    </div>

    <div id="chat"></div>

    <div class="bar">
        <input type="text" id="input" style="flex:1" placeholder="Prompt...">
        <button onclick="send()">ENVIAR</button>
    </div>

    <script>
        function login() {
            const key = document.getElementById('key').value;
            if (key === "CORE-SKYPE-2026") {
                document.getElementById('auth-overlay').style.display = 'none';
            }
        }
        function send() { /* Sua lógica de enviar */ }
    </script>
</body>
</html>
