<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SYNAPSE_CORE_MOBILE</title>
    <style>
        :root { --bg: #000; --accent: #0066FF; }
        body { background: var(--bg); color: #fff; margin: 0; font-family: 'JetBrains Mono', monospace; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* PAINEL FIXO SUPERIOR */
        .top-fixed { 
            display: flex; 
            align-items: center; 
            padding: 10px; 
            gap: 10px; 
            border-bottom: 1px solid #222;
        }
        
        /* CUBO MINIMIZADO À ESQUERDA */
        .cube-container { width: 40px; height: 40px; flex-shrink: 0; }
        .cube { width: 30px; height: 30px; border: 1px solid var(--accent); }
        
        /* BOTÕES DE AÇÃO NO TOPO (Não ficam embaixo) */
        .action-row { display: flex; gap: 5px; }
        .btn-mini { padding: 8px; font-size: 0.7rem; border: 1px solid #333; background: #000; color: #fff; border-radius: 4px; }

        /* CHAT */
        #chat-window { flex: 1; overflow-y: auto; padding: 15px; }
        
        /* INPUT SUSPENSO (Fora da zona de bloqueio do iOS) */
        .input-zone { padding: 10px; border-top: 1px solid #222; display: flex; gap: 10px; align-items: center; }
    </style>
</head>
<body>
    <div class="top-fixed">
        <div class="cube-container"><div class="cube"></div></div>
        <div class="action-row">
            <button class="btn-mini" onclick="enviar()">SEND</button>
            <button class="btn-mini" onclick="toggleMic()">MIC</button>
        </div>
    </div>

    <div id="chat-window"></div>

    <div class="input-zone">
        <input type="text" id="user-input" style="flex:1; background:#000; color:#fff; border:1px solid #333; padding:12px;">
    </div>

    <script>
        // Lógica de comunicação aqui...
    </script>
</body>
</html>
