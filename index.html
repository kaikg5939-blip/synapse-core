<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SYNAPSE MOBILE</title>
    <style>
        :root { --bg: #000; --accent: #0066FF; --text: #fff; }
        body { background: var(--bg); color: var(--text); margin: 0; font-family: 'JetBrains Mono', monospace; height: 100vh; display: flex; flex-direction: column; }
        
        /* CABEÇALHO TÁTICO */
        .header { padding: 10px; font-size: 0.6rem; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        
        /* PAINEL TÁTICO: Cubo pequeno na esquerda */
        .tactical-panel { display: flex; align-items: center; padding: 10px; gap: 15px; border-bottom: 1px solid #222; }
        .cube-wrapper { width: 50px; height: 50px; flex-shrink: 0; }
        .cube { width: 40px; height: 40px; border: 1px solid var(--accent); animation: spin 10s infinite linear; transform-style: preserve-3d; }
        
        /* CHAT */
        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px; border-radius: 8px; font-size: 0.85rem; max-width: 85%; }
        .ai-msg { align-self: flex-start; background: #111; }
        .user-msg { align-self: flex-end; background: var(--accent); }
        
        /* CONTROLES MÓVEIS (Mais altos) */
        .controls { padding: 15px; background: #000; border-top: 1px solid #222; display: flex; gap: 8px; align-items: center; }
        input { flex: 1; padding: 12px; background: #111; border: 1px solid #333; color: white; border-radius: 4px; }
        .btn { padding: 12px; border: none; background: var(--accent); color: white; border-radius: 4px; font-weight: bold; }
        
        @keyframes spin { from { transform: rotateY(0); } to { transform: rotateY(360deg); } }
    </style>
</head>
<body>
    <div class="header"><span>SYNAPSE_V4.5</span><span>DEV: SKYPE</span></div>
    
    <div class="tactical-panel">
        <div class="cube-wrapper">
            <div id="main-cube" class="cube"></div>
        </div>
        <div style="display:flex; gap: 5px;">
            <div onclick="mudarCor('#0066FF')" style="width:15px;height:15px;background:#0066FF;border-radius:50%"></div>
            <div onclick="mudarCor('#10b981')" style="width:15px;height:15px;background:#10b981;border-radius:50%"></div>
            <div onclick="mudarCor('#ef4444')" style="width:15px;height:15px;background:#ef4444;border-radius:50%"></div>
        </div>
    </div>

    <div id="chat-window"></div>
    
    <div class="controls">
        <input type="text" id="user-input" placeholder="Comando...">
        <button class="btn" onclick="enviar()">SEND</button>
        <button class="btn" onclick="toggleMic()">🎤</button>
    </div>

    <script>
        function mudarCor(c) { document.documentElement.style.setProperty('--accent', c); }
        async function enviar() {
            const input = document.getElementById('user-input');
            if(!input.value) return;
            // ... (Lógica de envio igual à anterior) ...
        }
        function toggleMic() { /* Lógica de Mic */ }
    </script>
</body>
</html>
