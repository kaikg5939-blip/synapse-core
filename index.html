<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYNAPSE CORE v5.5</title>
    <style>
        :root { --blue: #0066FF; --bg: #000000; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; }

        /* LOGIN MODERNO */
        #login-overlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { border: 1px solid var(--blue); padding: 40px; width: 300px; text-align: center; background: #050505; }
        .login-card input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; margin-bottom: 15px; }
        .login-card button { width: 100%; padding: 12px; background: var(--blue); color: #fff; border: none; font-weight: bold; cursor: pointer; }

        /* TOPO */
        .top-bar { padding: 15px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .btn-system { padding: 5px 12px; border: 1px solid var(--blue); background: transparent; color: var(--blue); cursor: pointer; font-size: 0.7rem; }

        /* TERMINAL E CUBO */
        .terminal-stage { display: flex; flex: 1; overflow: hidden; padding: 20px; gap: 20px; }
        .visual-side { width: 150px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-right: 1px solid #222; }
        
        /* CUBO GIRANDO */
        .cube-box { width: 80px; height: 80px; perspective: 500px; }
        .cube { width: 80px; height: 80px; transform-style: preserve-3d; animation: spin 4s infinite linear; }
        .cube.speaking { animation: spin 0.3s infinite linear; border: 2px solid #00ffcc; }
        @keyframes spin { 100% { transform: rotateX(360deg) rotateY(360deg); } }
        .face { position: absolute; width: 80px; height: 80px; border: 1px solid var(--blue); background: rgba(0,102,255,0.05); }

        /* CHAT E CONTROLES */
        #chat-window { flex: 1; overflow-y: auto; padding: 10px; }
        .controls { padding: 20px; border-top: 1px solid #222; display: flex; gap: 10px; }
        .controls input { flex: 1; padding: 15px; background: #000; border: 1px solid #444; color: #fff; }
        .btn-act { padding: 0 20px; background: var(--blue); color: #fff; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h3 style="margin-bottom:20px; color:var(--blue);">SYNAPSE CORE</h3>
            <input type="password" id="key" placeholder="CHAVE DE ACESSO">
            <button onclick="login()">CONECTAR</button>
        </div>
    </div>

    <div class="top-bar">
        <span>CORE v5.5 | STATUS: ONLINE</span>
        <div>
            <button class="btn-system" onclick="alert('LATENCIA: 120ms')">STATUS</button>
            <button class="btn-system" style="border-color:red; color:red;" onclick="location.reload()">SAIR</button>
        </div>
    </div>

    <div class="terminal-stage">
        <div class="visual-side">
            <div class="cube-box">
                <div class="cube" id="cubo">
                    <div class="face" style="transform:translateZ(40px)"></div>
                    <div class="face" style="transform:rotateY(180deg) translateZ(40px)"></div>
                    <div class="face" style="transform:rotateY(90deg) translateZ(40px)"></div>
                    <div class="face" style="transform:rotateY(-90deg) translateZ(40px)"></div>
                    <div class="face" style="transform:rotateX(90deg) translateZ(40px)"></div>
                    <div class="face" style="transform:rotateX(-90deg) translateZ(40px)"></div>
                </div>
            </div>
        </div>
        <div id="chat-window"></div>
    </div>

    <div class="controls">
        <input type="text" id="input" placeholder="DIGITE OU FALE...">
        <button class="btn-act" onclick="enviar()">ENVIAR</button>
        <button class="btn-act" onclick="falar()">FALAR</button>
    </div>

    <script>
        function login() { if(document.getElementById('key').value === "CORE-SKYPE-2026") document.getElementById('login-overlay').style.display = 'none'; }
        
        function falar() {
            const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            rec.onstart = () => document.getElementById('cubo').classList.add('speaking');
            rec.onresult = (e) => { document.getElementById('input').value = e.results[0][0].transcript; };
            rec.onend = () => document.getElementById('cubo').classList.remove('speaking');
            rec.start();
        }
    </script>
</body>
</html>
