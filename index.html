<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SYNAPSE_CORE_v4.5</title>
    <style>
        :root { --blue: #0066FF; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'JetBrains Mono', monospace; }
        body { background: var(--bg); color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* LOGIN MODERNO (FLUTUANTE) */
        #login-layer { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 90%; max-width: 320px; padding: 40px; border: 1px solid #222; text-align: center; }
        .login-card input { width: 100%; padding: 15px; background: #050505; border: 1px solid #333; color: var(--blue); text-align: center; margin-bottom: 20px; }
        .login-card button { width: 100%; padding: 15px; background: var(--blue); border: none; color: #fff; font-weight: bold; cursor: pointer; }

        /* UI DO CHAT */
        .nav { padding: 20px; display: flex; justify-content: space-between; border-bottom: 1px solid #222; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; }
        .controls { padding: 20px; display: flex; gap: 10px; border-top: 1px solid #222; }
    </style>
</head>
<body>

    <div id="login-layer">
        <div class="login-card">
            <h3 style="margin-bottom: 20px; letter-spacing: 3px;">LOGIN_SYSTEM</h3>
            <input type="password" id="key-input" placeholder="ACCESS_KEY">
            <button onclick="handleLogin()">INICIAR CONEXÃO</button>
        </div>
    </div>

    <div class="nav">
        <span>SYNAPSE_CORE</span>
        <span onclick="window.location.reload()" style="cursor:pointer">⋮</span>
    </div>

    <div id="chat"></div>

    <div class="controls">
        <input type="text" id="user-input" style="flex:1" placeholder="Prompt...">
        <button onclick="enviar()">SEND</button>
        <button onclick="falar()">MIC</button>
    </div>

    <script>
        function handleLogin() {
            const key = document.getElementById('key-input').value;
            if (key === "CORE-SKYPE-2026") {
                document.getElementById('login-layer').style.opacity = '0';
                setTimeout(() => { document.getElementById('login-layer').style.display = 'none'; }, 500);
            } else {
                alert("ACESSO NEGADO");
            }
        }
        // ... (resto do código de chat)
    </script>
</body>
</html>
