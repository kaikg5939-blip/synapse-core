<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SYNAPSE_CORE_PRO</title>
    <style>
        :root { --bg: #000; --accent: #0066FF; --text: #fff; }
        body { background: var(--bg); color: var(--text); margin: 0; font-family: 'JetBrains Mono', monospace; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        #setup-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .setup-btn { padding: 20px 40px; margin: 10px; border: 1px solid var(--accent); background: #000; color: #fff; cursor: pointer; font-size: 1.2rem; }

        .top-bar { display: flex; align-items: center; justify-content: space-between; padding: 15px; border-bottom: 1px solid #333; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; }
        .msg { padding: 15px; border-radius: 12px; margin-bottom: 15px; font-size: 1.1rem; max-width: 90%; }
        .ai-msg { align-self: flex-start; background: #111; }
        .user-msg { align-self: flex-end; background: var(--accent); }

        .mobile-controls { display: none; padding: 15px; border-top: 1px solid #333; gap: 10px; }
        .mode-mobile .desktop-only { display: none !important; }
        .mode-mobile .mobile-controls { display: flex !important; }
        
        .btn-action { padding: 15px; flex: 1; background: var(--accent); color: #fff; border: none; font-weight: bold; }
    </style>
</head>
<body>
    <div id="setup-screen">
        <button class="setup-btn" onclick="setMode('pc')">PC (COMPLETO)</button>
        <button class="setup-btn" onclick="setMode('mobile')">CELULAR (CLEAN)</button>
    </div>

    <div class="top-bar desktop-only">
        <div id="cube" style="width:40px;height:40px;border:1px solid var(--accent)"></div>
        <div id="color-dots" style="display:flex;gap:10px">
            <div style="width:20px;height:20px;border-radius:50%;background:#0066FF" onclick="cor('#0066FF')"></div>
            <div style="width:20px;height:20px;border-radius:50%;background:#10b981" onclick="cor('#10b981')"></div>
        </div>
    </div>

    <div id="chat-window"></div>

    <div class="mobile-controls">
        <button class="btn-action" onclick="enviar()">ENVIAR</button>
        <button class="btn-action" onclick="toggleMic()">FALAR</button>
    </div>

    <script>
        function setMode(m) {
            if(m === 'mobile') document.body.classList.add('mode-mobile');
            document.getElementById('setup-screen').style.display = 'none';
        }
        function cor(c) { document.documentElement.style.setProperty('--accent', c); }
        async function enviar() {
            const input = document.getElementById('user-input');
            // Lógica completa de chat que a gente construiu...
        }
    </script>
</body>
</html>
