<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SYNAPSE CORE v8.5 | SUPREMO</title>
    <style>
        :root { 
            --blue: #00f0ff; 
            --bg: #030305; 
            --panel: rgba(5, 5, 10, 0.85); 
            --border: rgba(0, 240, 255, 0.25); 
            --text: #ffffff; 
            --glow: 0 0 20px rgba(0, 240, 255, 0.4);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', -apple-system, sans-serif; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            position: relative; 
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(circle at 50% 30%, rgba(0, 102, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 10% 90%, rgba(0, 240, 255, 0.08) 0%, transparent 40%);
            filter: blur(60px);
            z-index: 0;
        }

        /* LOGIN GLASSMORPHISM */
        #login-overlay { 
            position: fixed; 
            inset: 0; 
            background: rgba(0, 0, 0, 0.95); 
            backdrop-filter: blur(30px); 
            z-index: 9999; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .login-card { 
            background: rgba(15, 15, 25, 0.6); 
            padding: 50px 40px; 
            border-radius: 4px; 
            border: 1px solid var(--border); 
            text-align: center; 
            width: 90%; 
            max-width: 400px; 
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), var(--glow); 
        }
        .login-card h3 { letter-spacing: 8px; color: var(--blue); margin-bottom: 45px; font-weight: 300; font-size: 1.1rem; text-transform: uppercase; text-shadow: var(--glow); }
        .login-card input { 
            width: 100%; 
            padding: 15px; 
            background: rgba(0, 0, 0, 0.5); 
            border: 1px solid #222; 
            color: var(--blue); 
            font-size: 1.3rem; 
            text-align: center; 
            outline: none; 
            letter-spacing: 4px;
        }
        .login-card button { 
            margin-top: 35px; 
            width: 100%;
            padding: 16px; 
            background: var(--blue); 
            color: #000; 
            font-weight: bold; 
            border: none;
            cursor: pointer; 
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* CABEÇALHO */
        .header { 
            padding: 20px 40px; 
            background: var(--panel); 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            backdrop-filter: blur(15px); 
            z-index: 100; 
        }
        .nav-brand { font-weight: 700; letter-spacing: 3px; color: var(--blue); font-size: 0.9rem; text-shadow: var(--glow); }
        .nav-actions { display: flex; gap: 15px; }
        .btn-top { 
            padding: 8px 16px; 
            border: 1px solid var(--blue); 
            background: transparent; 
            color: var(--blue); 
            font-size: 0.75rem; 
            font-weight: bold; 
            cursor: pointer; 
            text-transform: uppercase;
            transition: 0.2s;
        }
        .btn-top:hover { background: var(--blue); color: #000; box-shadow: var(--glow); }
        .btn-sair { border-color: #ff3355; color: #ff3355; }

        /* PALCO CENTRAL */
        .stage { display: flex; flex: 1; overflow: hidden; padding: 20px; gap: 20px; z-index: 1; }
        
        /* SIDEBAR / ÁREA DO CUBO (SISTEMA DE ANCORAGEM FIXA) */
        .sidebar { 
            width: 160px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start; 
            padding-top: 20px;
            gap: 40px; 
            border-right: 1px solid var(--border); 
        }
        
        /* CUBO REATIVO E REDIMENSIONADO */
        .cube-scene { width: 70px; height: 70px; perspective: 400px; }
        .cube { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; animation: spinContinuous 6s infinite linear; }
        .cube.speaking { animation: spinContinuous 0.5s infinite linear; }
        .cube.speaking .face { border-color: #00ffcc; box-shadow: inset 0 0 15px rgba(0, 255, 204, 0.3); }
        
        @keyframes spinContinuous { 100% { transform: rotateX(360deg) rotateY(360deg); } }
        
        .face { 
            position: absolute; 
            width: 70px; 
            height: 70px; 
            border: 2px solid var(--blue); 
            background: rgba(0, 240, 255, 0.02); 
            box-shadow: inset 0 0 15px rgba(0, 240, 255, 0.15); 
            transition: 0.3s;
            -webkit-backface-visibility: visible;
            backface-visibility: visible;
        }
        .front  { transform: rotateY(  0deg) translateZ(35px); }
        .back   { transform: rotateY(180deg) translateZ(35px); }
        .right  { transform: rotateY( 90deg) translateZ(35px); }
        .left   { transform: rotateY(-90deg) translateZ(35px); }
        .top    { transform: rotateX( 90deg) translateZ(35px); }
        .bottom { transform: rotateX(-90deg) translateZ(35px); }

        .palette { display: flex; gap: 10px; }
        .dot { width: 18px; height: 18px; border-radius: 50%; cursor: pointer; }

        /* CONVERSAÇÃO */
        #chat-flow { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 15px; background: var(--panel); border: 1px solid var(--border); border-radius: 4px; backdrop-filter: blur(10px); }
        .message { padding: 16px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.05); max-width: 85%; line-height: 1.5; font-size: 0.95rem; }
        .user-msg { align-self: flex-end; background: rgba(0, 240, 255, 0.05); border-color: var(--blue); color: var(--blue); }
        .ai-msg { align-self: flex-start; background: rgba(15, 15, 20, 0.6); }
        .img-result { max-width: 100%; border: 1px solid var(--blue); margin-top: 10px; border-radius: 2px; }

        /* CONTROLES / DIGITAL COMMAND BAR */
        .dock { 
            padding: 20px 40px; 
            background: var(--panel); 
            border-top: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            backdrop-filter: blur(15px); 
            z-index: 100; 
        }
        .disclaimer { font-size: 0.6rem; color: #444; text-align: center; letter-spacing: 1px; text-transform: uppercase; }
        .console-row { display: flex; gap: 15px; align-items: center; }
        
        .input-wrapper { flex: 1; position: relative; background: #000; border: 1px solid #222; border-radius: 4px; }
        .input-wrapper::before { content: 'COMANDO:'; position: absolute; left: 15px; top: 16px; font-size: 0.8rem; color: #444; font-weight: bold; }
        
        .console-input { 
            width: 100%;
            padding: 15px 15px 15px 90px; 
            background: transparent;
            border: none;
            color: #fff; 
            outline: none; 
            font-size: 0.95rem; 
        }
        
        .btn-core { 
            height: 50px;
            padding: 0 30px; 
            border: none; 
            border-radius: 4px;
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.2s; 
            font-size: 0.85rem;
            text-transform: uppercase;
        }
        .btn-send { background: var(--blue); color: #000; box-shadow: var(--glow); }
        .btn-mic { background: rgba(20, 20, 30, 0.8); color: #fff; border: 1px solid #333; }
        .btn-mic.active { background: #ff3355; border-color: #ff3355; box-shadow: 0 0 15px #ff3355; }

        /* RESPONSIVIDADE SUPREMA CELULAR */
        @media (max-width: 768px) {
            .header { padding: 15px 20px; }
            .stage { flex-direction: column; padding: 10px; gap: 10px; }
            .sidebar { 
                width: 100%; 
                height: auto; 
                flex-direction: row; 
                justify-content: space-between; 
                align-items: center; 
                padding: 10px; 
                border-right: none; 
                border-bottom: 1px solid var(--border);
            }
            .cube-scene { width: 45px; height: 45px; }
            .face { width: 45px; height: 45px; }
            .front  { transform: rotateY(  0deg) translateZ(22.5px); }
            .back   { transform: rotateY(180deg) translateZ(22.5px); }
            .right  { transform: rotateY( 90deg) translateZ(22.5px); }
            .left   { transform: rotateY(-90deg) translateZ(22.5px); }
            .top    { transform: rotateX( 90deg) translateZ(22.5px); }
            .bottom { transform: rotateX(-90deg) translateZ(22.5px); }
            .dock { padding: 15px; }
            .console-row { flex-wrap: wrap; gap: 10px; }
            .input-wrapper { min-width: 100%; }
            .btn-core { flex: 1; height: 50px; }
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h3>SYNAPSE CORE</h3>
            <input type="password" id="access-key" placeholder="CHAVE" onkeydown="if(event.key==='Enter') autenticar()">
            <button onclick="autenticar()">CONECTAR</button>
            <p id="error-alert" style="color:#ff3355; font-size:0.75rem; margin-top:15px; display:none;">ACESSO RECUSADO</p>
        </div>
    </div>

    <div class="header">
        <div class="nav-brand">SYNAPSE CORE</div>
        <div class="nav-actions">
            <button class="btn-top" onclick="exibirStatus()">STATUS</button>
            <button class="btn-top btn-sair" onclick="desconectar()">SAIR</button>
        </div>
    </div>

    <div class="stage">
        <div class="sidebar">
            <div class="cube-scene">
                <div class="cube" id="sys-cube">
                    <div class="face front"></div><div class="face back"></div>
                    <div class="face right"></div><div class="face left"></div>
                    <div class="face top"></div><div class="face bottom"></div>
                </div>
            </div>
            <div class="palette">
                <div class="dot" style="background:#00f0ff;" onclick="alterarTema('#00f0ff')"></div>
                <div class="dot" style="background:#00ffcc;" onclick="alterarTema('#00ffcc')"></div>
                <div class="dot" style="background:#ff0055;" onclick="alterarTema('#ff0055')"></div>
            </div>
        </div>
        <div id="chat-flow"></div>
    </div>

    <div class="dock">
        <div class="disclaimer">O sistema pode cometer erros assim como qualquer humano ou robô. Verifique as informações.</div>
        <div class="console-row">
            <div class="input-wrapper">
                <input type="text" id="console-in" class="console-input" placeholder="DIGITE SEU COMANDO..." onkeydown="if(event.key==='Enter') enviarMensagem('texto')">
            </div>
            <button class="btn-core btn-send" onclick="enviarMensagem('texto')">ENVIAR</button>
            <button class="btn-core btn-mic" id="btn-mic" onclick="capturarVoz()">FALAR</button>
        </div>
    </div>

    <script>
        let historico = [];
        let modoAtual = 'texto';

        window.onload = () => {
            if (sessionStorage.getItem('syn_auth_v85') === 'valid') {
                document.getElementById('login-overlay').style.display = 'none';
            }
        };

        function autenticar() {
            const key = document.getElementById('access-key').value.trim().toUpperCase();
            if (key === "CORE-SKYPE-2026") {
                sessionStorage.setItem('syn_auth_v85', 'valid');
                document.getElementById('login-overlay').style.opacity = '0';
                setTimeout(() => document.getElementById('login-overlay').style.display = 'none', 400);
            } else {
                document.getElementById('error-alert').style.display = 'block';
            }
        }

        function desconectar() {
            sessionStorage.removeItem('syn_auth_v85');
            window.location.reload();
        }

        function alterarTema(hex) { document.documentElement.style.setProperty('--blue', hex); }

        function exibirStatus() {
            alert(
                "SISTEMA OPERACIONAL SYNAPSE\n" +
                "-----------------------------------\n" +
                "DESENVOLVEDOR: SKYPE\n" +
                "ESTABELECIDO: JUNHO DE 2026\n" +
                "GERENCIAMENTO: EXCLUSIVO (1 USUÁRIO AUTORIZADO)\n" +
                "AMBIENTE: SECURE OPERATIONAL CORE\n" +
                "STATUS: ONLINE"
            );
        }

        function renderBalao(texto, isAi, isImage = false) {
            const painel = document.getElementById('chat-flow');
            const div = document.createElement('div');
            div.className = `message ${isAi ? 'ai-msg' : 'user-msg'}`;
            
            if (isImage) {
                const img = document.createElement('img');
                img.className = 'img-result';
                img.src = texto;
                div.innerText = "IMAGEM GERADA:";
                div.appendChild(img);
            } else {
                div.innerText = texto;
            }

            painel.appendChild(div);
            painel.scrollTop = painel.scrollHeight;
        }

        async function enviarMensagem(modo) {
            const input = document.getElementById('console-in');
            const prompt = input.value.trim();
            if (!prompt) return;

            modoAtual = modo;
            input.value = '';

            // Engine de detecção para Geração de Imagem
            if (prompt.toLowerCase().startsWith("gerar imagem") || prompt.toLowerCase().startsWith("criar imagem")) {
                renderBalao(prompt, false);
                const queryDesc = prompt.replace(/(gerar imagem|criar imagem)/i, "").trim();
                const urlImagem = `https://image.pollinations.ai/prompt/${encodeURIComponent(queryDesc)}?width=512&height=512&nologo=true`;
                setTimeout(() => { renderBalao(urlImagem, true, true); }, 1000);
                return;
            }

            renderBalao(prompt, false);
            historico.push({ role: "user", content: prompt });

            try {
                const respostaServidor = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mensagens: historico })
                });
                const dados = await respostaServidor.json();
                const respostaIA = dados.resposta;

                renderBalao(respostaIA, true);
                historico.push({ role: "assistant", content: respostaIA });

                if (modoAtual === 'voz') { executarVoz(respostaIA); }
            } catch (error) {
                renderBalao("ERRO DE CONEXÃO COM O SERVIDOR.", true);
            }
        }

        function capturarVoz() {
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(''));
            const SpeechAPI = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechAPI) return;

            const rec = new SpeechAPI();
            rec.lang = 'pt-BR';
            rec.continuous = false;

            rec.onstart = () => {
                document.getElementById('btn-mic').innerText = "OUVINDO...";
                document.getElementById('btn-mic').classList.add('active');
            };
            rec.onresult = (e) => {
                const capturado = e.results[0][0].transcript;
                document.getElementById('console-in').value = capturado;
                enviarMensagem('voz');
                rec.stop();
            };
            rec.onend = () => {
                document.getElementById('btn-mic').innerText = "FALAR";
                document.getElementById('btn-mic').classList.remove('active');
            };
            rec.start();
        }

        function executarVoz(texto) {
            window.speechSynthesis.cancel();
            const fala = new SpeechSynthesisUtterance(texto);
            fala.lang = 'pt-BR';
            fala.onstart = () => document.getElementById('sys-cube').classList.add('speaking');
            fala.onend = () => document.getElementById('sys-cube').classList.remove('speaking');
            window.speechSynthesis.speak(fala);
        }
    </script>
</body>
</html>
