<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYNAPSE CORE v4.5</title>
    <style>
        :root { --blue: #0066FF; --bg: #000; --text: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'JetBrains Mono', monospace; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* LOGIN */
        #auth-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .auth-box { width: 90%; max-width: 300px; text-align: center; }
        input { width: 100%; padding: 15px; margin-bottom: 10px; background: #111; border: 1px solid #333; color: #fff; text-align: center; }
        button { width: 100%; padding: 15px; background: var(--blue); border: none; color: #fff; cursor: pointer; }

        /* HEADER */
        .header { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #333; align-items: center; }
        .cube-pc { width: 40px; height: 40px; border: 1px solid var(--blue); }
        .hidden-mobile { display: flex; }
        @media (max-width: 768px) { .hidden-mobile { display: none !important; } }

        /* CHAT */
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px; border: 1px solid #333; max-width: 85%; }
        .user { align-self: flex-end; border-color: var(--blue); }
        
        /* CONTROLES */
        .controls { padding: 15px; border-top: 1px solid #333; display: flex; gap: 10px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <input type="password" id="key" placeholder="CHAVE DE ACESSO">
            <button onclick="login()">ENTRAR</button>
        </div>
    </div>

    <div class="header">
        <div class="cube-pc hidden-mobile"></div>
        <span>SYNAPSE v4.5</span>
        <span onclick="window.location.reload()" style="cursor:pointer">⋮ SAIR</span>
    </div>

    <div id="chat"></div>

    <div class="controls">
        <input type="text" id="input" style="flex:1" placeholder="Prompt...">
        <button onclick="enviar()">SEND</button>
        <button onclick="falar()">MIC</button>
    </div>

    <script>
        function login() {
            if(document.getElementById('key').value === "CORE-SKYPE-2026") {
                document.getElementById('auth-screen').style.display = 'none';
            } else { alert("Chave inválida"); }
        }
        async function enviar() { /* Lógica de Envio */ }
        function falar() { /* Lógica de Fala */ }
    </script>
</body>
</html>
