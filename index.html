<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SYNAPSE CORE | MOBILE</title>
    <style>
        :root { --strong-blue: #0066FF; --bg: #050505; --text: #fff; }
        body { background: var(--bg); color: var(--text); margin: 0; font-family: 'JetBrains Mono', monospace; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* CABEÇALHO */
        .top-bar { padding: 15px; text-align: center; font-size: 0.8rem; letter-spacing: 5px; border-bottom: 1px solid #222; }
        
        /* CHAT */
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 15px; border-radius: 12px; font-size: 0.9rem; max-width: 90%; }
        .ai-msg { align-self: flex-start; background: #111; border: 1px solid #333; }
        .user-msg { align-self: flex-end; background: var(--strong-blue); }
        
        /* CONTROLE */
        .controls { padding: 20px; background: #000; border-top: 1px solid #222; display: flex; flex-direction: column; gap: 10px; }
        .input-row { display: flex; gap: 10px; }
        input { flex: 1; padding: 15px; background: #000; border: 1px solid #333; color: white; border-radius: 8px; }
        .btn-action { padding: 15px; border: 1px solid #333; background: #111; color: #fff; border-radius: 8px; cursor: pointer; }
        #mic-btn.active { border-color: red; color: red; }
    </style>
</head>
<body>
    <div class="top-bar">SYNAPSE CORE v4.5 | DEVELOPED BY SKYPE</div>
    <div id="chat-window"></div>
    <div class="controls">
        <div class="input-row">
            <input type="text" id="user-input" placeholder="Prompt...">
            <button class="btn-action" onclick="enviar()">SEND</button>
        </div>
        <button id="mic-btn" class="btn-action" onclick="toggleMic()">ATIVAR MICROFONE (MÃOS LIVRES)</button>
    </div>

    <script>
        let isSpeaking = false;
        let rec;

        // Microfone Blindado
        function toggleMic() {
            if (isSpeaking) return;
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            rec = new SpeechRecognition();
            rec.lang = 'pt-BR';
            rec.onresult = (e) => {
                document.getElementById('user-input').value = e.results[0][0].transcript;
                enviar();
                document.getElementById('mic-btn').classList.remove('active');
            };
            rec.start();
            document.getElementById('mic-btn').classList.add('active');
        }

        async function enviar() {
            const input = document.getElementById('user-input');
            const msg = input.value.trim();
            if(!msg) return;

            // Interface
            const div = document.createElement('div');
            div.className = 'msg user-msg';
            div.innerText = msg;
            document.getElementById('chat-window').appendChild(div);
            input.value = '';

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mensagens: [{ role: 'user', content: msg }] })
                });
                const data = await res.json();
                
                const divAi = document.createElement('div');
                divAi.className = 'msg ai-msg';
                divAi.innerText = data.resposta;
                document.getElementById('chat-window').appendChild(divAi);
                
                // Fala automática apenas se não for imagem
                if(!data.resposta.includes("__IMAGE_URL__:")) {
                    isSpeaking = true;
                    const ut = new SpeechSynthesisUtterance(data.resposta);
                    ut.onend = () => { isSpeaking = false; };
                    window.speechSynthesis.speak(ut);
                }
            } catch(e) { alert("Erro de conexão"); }
        }
    </script>
</body>
</html>
