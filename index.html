<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYNAPSE_CORE_v4.5_FIXED</title>
    <style>
        :root { --bg: #000; --accent: #0066FF; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: monospace; }
        body { background: var(--bg); color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* HEADER FIXO - CUBO ESQUERDA + BOTOES DIREITA */
        .header-fixed { 
            height: 60px; 
            display: flex; 
            align-items: center; 
            padding: 0 15px; 
            border-bottom: 1px solid #333;
            background: #000;
        }
        .cube-tiny { width: 30px; height: 30px; border: 1px solid var(--accent); flex-shrink: 0; }
        .controls-top { display: flex; gap: 10px; margin-left: auto; }
        
        .btn-top { padding: 8px 12px; background: #111; border: 1px solid #444; color: #fff; border-radius: 4px; font-size: 0.8rem; }

        /* CHAT WINDOW */
        #chat-window { flex: 1; overflow-y: auto; padding: 15px; }
        
        /* INPUT AREA FIXA NO TOPO - PARA NÃO BRIGAR COM TECLADO */
        .input-box { padding: 10px; border-bottom: 1px solid #333; }
        input { width: 100%; padding: 12px; background: #000; color: #fff; border: 1px solid #444; }
    </style>
</head>
<body>
    <div class="header-fixed">
        <div class="cube-tiny"></div>
        <div class="controls-top">
            <button class="btn-top" onclick="enviar()">SEND</button>
            <button class="btn-top" onclick="toggleMic()">MIC</button>
        </div>
    </div>
    <div class="input-box"><input type="text" id="user-input" placeholder="Prompt..."></div>
    <div id="chat-window"></div>

    <script>
        // Forçar reload se o cache estiver lixo
        if(!localStorage.getItem('v4.5')) {
            localStorage.setItem('v4.5', 'true');
            window.location.reload(true);
        }
        // ... (resto da lógica)
    </script>
</body>
</html>
